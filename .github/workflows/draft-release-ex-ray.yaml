name: Draft Release (ex-ray)

on:
  workflow_dispatch:
    inputs: &inputs
      version:
        description: "ex-ray release version (e.g. 0.1.0)"
        required: true
        type: string
  workflow_call:
    inputs: *inputs

permissions:
  contents: write

jobs:
  validate:
    name: Validate version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable

      - name: Normalize and validate version
        id: version
        run: |
          V="${{ inputs.version }}"
          V="${V#v}"
          V="${V#releases/ex-ray/v}"
          # ex-ray uses plain semver only (X.Y.Z), no pre-release/lineage suffix.
          [[ "$V" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]] || { echo "::error::Invalid version: '${{ inputs.version }}'"; exit 1; }
          echo "version=$V" >> "$GITHUB_OUTPUT"

      - name: Create local tag for build
        run: git tag "releases/ex-ray/v${{ steps.version.outputs.version }}"

      - name: Validate version.toml matches version
        run: cargo xtask version --check --exact --group ex-ray

  # Native-runner matrix over the galoshes/garter 6-platform set:
  # windows amd64/arm64, darwin amd64/arm64, linux amd64/arm64.
  # Assets named ex-ray-{version}-{os}-{arch}[.exe].
  build:
    name: Build (${{ matrix.os }}/${{ matrix.arch }})
    needs: validate
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: true
      matrix:
        include:
          - { os: windows, arch: amd64, runner: windows-latest    }
          - { os: windows, arch: arm64, runner: windows-11-arm    }
          - { os: darwin,  arch: amd64, runner: macos-15-intel    }
          - { os: darwin,  arch: arm64, runner: macos-latest      }
          - { os: linux,   arch: amd64, runner: ubuntu-latest     }
          - { os: linux,   arch: arm64, runner: ubuntu-24.04-arm  }
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version-file: crates/ex-ray/go.mod

      - name: Build ex-ray (native)
        shell: bash
        run: cargo xtask ex-ray

      # Stage as ex-ray-{version}-{os}-{arch}[.exe]
      # Source: .cache/ex-ray/ex-ray-<target-triple>{.exe}
      - name: Stage with ex-ray naming convention
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ needs.validate.outputs.version }}"
          OS="${{ matrix.os }}"
          ARCH="${{ matrix.arch }}"

          # cargo xtask ex-ray produces .cache/ex-ray/ex-ray-<target-triple>{.exe}
          # We need to find that file regardless of the actual host triple.
          shopt -s nullglob
          SRCS=(.cache/ex-ray/ex-ray-*)
          if [ "${#SRCS[@]}" -ne 1 ]; then
            echo "::error::Expected exactly one ex-ray binary in .cache/ex-ray/, got ${#SRCS[@]}: ${SRCS[*]}"
            exit 1
          fi
          SRC="${SRCS[0]}"
          EXT=""
          if [ "$OS" = "windows" ]; then EXT=".exe"; fi
          ASSET="ex-ray-${VERSION}-${OS}-${ARCH}${EXT}"
          cp "$SRC" "$ASSET"
          echo "Artifact: $ASSET"

      - uses: actions/upload-artifact@v7
        with:
          name: ex-ray-${{ matrix.os }}-${{ matrix.arch }}
          path: ex-ray-*

  release:
    name: Create draft release
    needs: [validate, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: ex-ray-*
          merge-multiple: true

      # Hash on ubuntu (single platform) so SHA256SUMS is uniformly
      # text-mode regardless of which per-matrix runner built each
      # artifact. Git-Bash sha256sum on Windows defaults to binary mode
      # (asterisk marker), macOS defaults to text mode; hashing here
      # avoids that divergence entirely. See #355.
      - name: Compute SHA256SUMS
        run: |
          sha256sum ex-ray-* > SHA256SUMS

          lines=$(wc -l < SHA256SUMS)
          if [ "$lines" -ne 6 ]; then
            echo "::error::Expected 6 entries in SHA256SUMS (6-platform matrix), got $lines"
            exit 1
          fi

          echo "SHA256SUMS:"
          cat SHA256SUMS

      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          path: source

      - uses: astral-sh/setup-uv@v8.3.2

      - name: Generate per-track release notes
        run: |
          VERSION="${{ needs.validate.outputs.version }}"
          TAG="releases/ex-ray/v${VERSION}"
          uv run source/scripts/generate-release-notes.py ex-ray \
            --new-tag "$TAG" \
            --head "${{ github.sha }}" \
            --repo-root source \
            > release-notes.md
          echo "--- release-notes.md ---"
          cat release-notes.md
          echo "--- end ---"

      # --latest=false at draft-create time pins GitHub's make_latest so
      # the eventual publish doesn't promote this release to
      # /releases/latest via the legacy semver+date heuristic. Hole is
      # the only track that claims /latest. See #308.
      - name: Create draft release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          VERSION="${{ needs.validate.outputs.version }}"
          TAG="releases/ex-ray/v${VERSION}"
          gh release create "$TAG" \
            --draft \
            --latest=false \
            --notes-file release-notes.md \
            --title "ex-ray v${VERSION}" \
            --target "${{ github.sha }}" \
            ex-ray-* SHA256SUMS
          echo "Draft release created: https://github.com/${{ github.repository }}/releases/tag/$TAG"
