name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  lint:
    name: Lint
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"
      - uses: astral-sh/setup-uv@v7

      - uses: ./.github/actions/setup-build

      - name: Install prek
        run: uv tool install prek

      - name: Run linters
        run: prek run --all-files --show-diff-on-failure

  test:
    name: Test (${{ matrix.os }}/${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: windows, arch: amd64, runner: windows-latest }
          - { os: darwin,  arch: amd64, runner: macos-15-intel }
          - { os: darwin,  arch: arm64, runner: macos-latest }
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup-build

      # Work around the #200 loopback flake. Theory (see
      # bindreams/hole#200 CI runs 10-12): Windows Defender's real-time
      # scan of freshly-staged `hole.exe` (rebuilt per DistHarness by
      # `xtask::run_stage` via `remove_file` + `hard_link`) installs a
      # kernel-mode WFP callout that silently drops loopback packets
      # machine-wide for ~30 s. Exclude the directories that get churned
      # and the processes that get spawned so the scan never fires.
      # Runs on BOTH windows-latest (Server 2025) and windows-2022 —
      # Phase 1 of this investigation proved the flake reproduces on
      # Server 2022 as well, so the fingerprint is not OS-specific.
      - name: Add Defender exclusions (#200 loopback flake workaround)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          try { $null = Get-MpPreference } catch {
            throw "Defender not available on this runner; exclusion probe meaningless: $_"
          }
          Add-MpPreference -ExclusionPath "$env:GITHUB_WORKSPACE\target"
          Add-MpPreference -ExclusionPath "$env:RUNNER_TEMP"
          Add-MpPreference -ExclusionPath "$env:USERPROFILE\.cargo"
          Add-MpPreference -ExclusionPath "$env:USERPROFILE\.rustup"
          Add-MpPreference -ExclusionPath "C:\hostedtoolcache"
          Add-MpPreference -ExclusionProcess "hole.exe"
          Add-MpPreference -ExclusionProcess "v2ray-plugin.exe"
          Add-MpPreference -ExclusionProcess "galoshes.exe"
          Get-MpPreference | Select-Object ExclusionPath, ExclusionProcess | Format-List

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      # cargo clippy uses `cargo check`, which leaves binary outputs under
      # `target/debug/deps/hole-<hash>.exe` but does NOT create the
      # top-level `target/debug/hole[.exe]` copy. The bridge crate's e2e
      # test fixture (`dist_dir`) calls `xtask::run_stage` to hardlink
      # `target/debug/hole[.exe]` into `target/debug/dist/bin/`, so we
      # need a real `cargo build` to produce it.
      - name: Build workspace (for dist-dir test fixture)
        run: cargo build --workspace

      - name: Install nextest
        shell: bash
        run: cargo install cargo-nextest --locked

      - name: Test
        id: test
        shell: bash
        run: cargo nextest run --workspace

      # #200 diagnostics: upload bridge.log and netsh-trace.etl produced
      # by `DistHarness` subprocesses. Matches files that the test
      # harness redirected to `$RUNNER_TEMP` (see
      # `crates/bridge/src/test_support/dist_harness.rs::new_tempdir`).
      # Windows-only: the ETL capture is a no-op on macOS.
      - name: Upload bridge logs on test failure
        if: failure() && steps.test.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: bridge-logs-${{ matrix.os }}-${{ matrix.arch }}
          path: |
            ${{ runner.temp }}/**/bridge.log
            ${{ runner.temp }}/**/netsh-trace.etl
          if-no-files-found: ignore
          retention-days: 14


  test-installer:
    name: Test installer (windows/amd64)
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v7
      - uses: ./.github/actions/setup-build

      - name: Test
        working-directory: msi-installer
        run: uv run --group dev pytest -v

      - name: Build MSI
        run: uv run --directory msi-installer build

      - name: Smoke-test binary
        run: target\release\hole.exe version

      - name: Install
        shell: pwsh
        run: |
          $log = "$env:RUNNER_TEMP\msi-install.log"
          $proc = Start-Process msiexec -ArgumentList "/i","target\release\hole.msi","/quiet","/norestart","/l*vx",$log -Wait -PassThru
          if ($proc.ExitCode -ne 0) {
            Get-Content $log -Tail 50
            throw "msiexec /i failed with exit code $($proc.ExitCode)"
          }

      - name: Verify install
        shell: pwsh
        run: |
          $binDir = "C:\Program Files\hole\bin"
          foreach ($f in @("hole.exe", "v2ray-plugin.exe", "wintun.dll")) {
            if (!(Test-Path "$binDir\$f")) { throw "$f not found" }
          }
          $svc = Get-Service -Name HoleBridge -ErrorAction SilentlyContinue
          if (!$svc) { throw "HoleBridge service not registered" }
          $path = [Environment]::GetEnvironmentVariable("Path", "Machine")
          if ($path -notmatch [regex]::Escape($binDir)) { throw "$binDir not in PATH" }

      - name: Dump install log on failure
        if: failure()
        shell: pwsh
        run: |
          $log = "$env:RUNNER_TEMP\msi-install.log"
          if (Test-Path $log) { Get-Content $log -Tail 200 }

      - name: Uninstall
        if: always()
        shell: pwsh
        run: |
          $log = "$env:RUNNER_TEMP\msi-uninstall.log"
          $proc = Start-Process msiexec -ArgumentList "/x","target\release\hole.msi","/quiet","/norestart","/l*vx",$log -Wait -PassThru
          if ($proc.ExitCode -ne 0) {
            Get-Content $log -Tail 50
            Write-Warning "msiexec /x failed with exit code $($proc.ExitCode)"
          }

      - name: Verify uninstall
        if: always()
        shell: pwsh
        run: |
          $binDir = "C:\Program Files\hole\bin"
          if (Test-Path $binDir) { throw "$binDir still exists" }
          $svc = Get-Service -Name HoleBridge -ErrorAction SilentlyContinue
          if ($svc) { throw "HoleBridge service still registered" }
          $path = [Environment]::GetEnvironmentVariable("Path", "Machine")
          if ($path -match [regex]::Escape($binDir)) { throw "$binDir still in PATH" }
