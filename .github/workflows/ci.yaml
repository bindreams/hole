name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  lint:
    name: Lint
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"
      - uses: astral-sh/setup-uv@v7

      - uses: ./.github/actions/setup-build

      - name: Install prek
        run: uv tool install prek

      # cargo-clippy is skipped here because it's run per-platform in the
      # build job (see ci.yaml below). cargo-fmt stays active — it is
      # platform-independent, one Windows invocation covers the workspace.
      - name: Run linters
        env:
          SKIP: cargo-clippy
        run: prek run --all-files --show-diff-on-failure

  # Per-platform build job: compiles clippy + test binaries once and publishes
  # them as a platform-scoped artifact (`build-<os>-<arch>`). Test jobs below
  # download the archive and run filtered tests without invoking the Rust
  # toolchain. See .tmp/claude/plans/i-want-to-refactor-polymorphic-catmull.md
  # for the full design (esp. the matrix `needs:` trade-off: compile errors
  # in any crate fail `build[P]` and skip all `test-*[P]` cells).
  build:
    name: Build (${{ matrix.os }}/${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: windows, arch: amd64, runner: windows-latest }
          - { os: darwin,  arch: amd64, runner: macos-15-intel }
          - { os: darwin,  arch: arm64, runner: macos-latest }
          - { os: linux,   arch: amd64, runner: ubuntu-latest }
          - { os: linux,   arch: arm64, runner: ubuntu-24.04-arm }
          - { os: windows, arch: arm64, runner: windows-11-arm }
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup-build

      - uses: cargo-bins/cargo-binstall@v1.18.1

      - name: Install nextest
        shell: bash
        env:
          # Authenticated GitHub API has a 5000 req/h limit; without this,
          # binstall can hit the 60 req/h unauthenticated limit and fall
          # back to `cargo install`, which fails because nextest's
          # `locked-tripwire` crate requires --locked.
          GITHUB_TOKEN: ${{ github.token }}
        run: cargo binstall --no-confirm --locked cargo-nextest

      # Clippy coverage is platform-gated the same way as before: full
      # workspace on Hole platforms (windows/amd64, darwin/*); ex-Galoshes
      # crates only on platforms Hole doesn't ship on.
      - name: Clippy (Hole workspace)
        if: matrix.os == 'darwin' || (matrix.os == 'windows' && matrix.arch == 'amd64')
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Clippy (ex-Galoshes only)
        if: matrix.os == 'linux' || (matrix.os == 'windows' && matrix.arch == 'arm64')
        run: cargo clippy -p garter -p garter-bin -p galoshes -p mock-plugin --all-targets -- -D warnings

      # Produce a portable nextest archive. Hole platforms archive the whole
      # workspace; non-Hole platforms archive only the ex-Galoshes crates
      # (Hole's Tauri app + platform-gated crates don't compile on Linux
      # or windows-arm64).
      - name: Build test archive (Hole workspace)
        if: matrix.os == 'darwin' || (matrix.os == 'windows' && matrix.arch == 'amd64')
        shell: bash
        run: |
          mkdir -p ci-artifacts
          cargo nextest archive --workspace --archive-file ci-artifacts/tests.tar.zst

      - name: Build test archive (ex-Galoshes only)
        if: matrix.os == 'linux' || (matrix.os == 'windows' && matrix.arch == 'arm64')
        shell: bash
        run: |
          mkdir -p ci-artifacts
          cargo nextest archive -p garter -p garter-bin -p galoshes -p mock-plugin --archive-file ci-artifacts/tests.tar.zst

      # `cargo nextest archive` builds test targets but NOT regular binaries.
      # `xtask stage` needs `target/debug/hole[.exe]` present, so do a proper
      # build first. sccache dedupes dep compilation against the archive step.
      - name: Build hole binary (for dist staging)
        if: matrix.os == 'darwin' || (matrix.os == 'windows' && matrix.arch == 'amd64')
        run: cargo build --workspace

      # Hole e2e tests in the bridge crate use `dist_fixture`, which at test
      # time invokes `xtask::run_stage` to hardlink the BINDIR files into
      # `target/debug/dist/bin/`. `run_stage` reads its sources from
      # `target/debug/hole[.exe]`, `target/debug/galoshes[.exe]`, and
      # `.cache/{v2ray-plugin,wintun}/`. Those files were produced by
      # `cargo build --workspace` + `cargo xtask deps` above; include them in
      # the artifact so the fixture finds them on the test runner.
      # Non-Hole platforms don't have target/debug/hole etc.; `if-no-files-found: ignore`
      # lets the upload succeed with just the test archive.
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.os }}-${{ matrix.arch }}
          path: |
            ci-artifacts/tests.tar.zst
            target/debug/hole
            target/debug/hole.exe
            target/release/galoshes
            target/release/galoshes.exe
            .cache/v2ray-plugin/
            .cache/wintun/
          retention-days: 3
          if-no-files-found: ignore

  # Three per-project test jobs, all consuming the `build-<os>-<arch>` artifact
  # and running `cargo nextest run --archive-file`. They install the nextest
  # binary via taiki-e/install-action (no Rust toolchain needed) and skip the
  # `setup-build` composite action entirely.
  test-garter:
    name: Test garter (${{ matrix.os }}/${{ matrix.arch }})
    needs: build
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: windows, arch: amd64, runner: windows-latest }
          - { os: darwin,  arch: amd64, runner: macos-15-intel }
          - { os: darwin,  arch: arm64, runner: macos-latest }
          - { os: linux,   arch: amd64, runner: ubuntu-latest }
          - { os: linux,   arch: arm64, runner: ubuntu-24.04-arm }
          - { os: windows, arch: arm64, runner: windows-11-arm }
    steps:
      - uses: actions/checkout@v6

      - name: Install nextest (pre-built binary)
        uses: taiki-e/install-action@v2
        with:
          tool: nextest

      - uses: actions/download-artifact@v4
        with:
          name: build-${{ matrix.os }}-${{ matrix.arch }}
          path: .  # restore to workspace root so target/debug/* + .cache/* land correctly for dist_fixture

      # `cargo nextest run --archive-file` refuses `-p`; the archive's
      # package set is frozen at build time. Filter by `-E package(...)`
      # instead. `target/debug/` must exist because skuld writes its
      # test-coordination SQLite DB at `<workspace>/target/debug/.skuld.db`.
      - name: Run tests
        shell: bash
        run: |
          mkdir -p target/debug
          cargo nextest run \
            --archive-file ci-artifacts/tests.tar.zst \
            --workspace-remap "${{ github.workspace }}" \
            -E 'package(garter) + package(garter-bin) + package(mock-plugin)'

  test-galoshes:
    name: Test galoshes (${{ matrix.os }}/${{ matrix.arch }})
    needs: build
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: windows, arch: amd64, runner: windows-latest }
          - { os: darwin,  arch: amd64, runner: macos-15-intel }
          - { os: darwin,  arch: arm64, runner: macos-latest }
          - { os: linux,   arch: amd64, runner: ubuntu-latest }
          - { os: linux,   arch: arm64, runner: ubuntu-24.04-arm }
          - { os: windows, arch: arm64, runner: windows-11-arm }
    steps:
      - uses: actions/checkout@v6

      - name: Install nextest (pre-built binary)
        uses: taiki-e/install-action@v2
        with:
          tool: nextest

      - uses: actions/download-artifact@v4
        with:
          name: build-${{ matrix.os }}-${{ matrix.arch }}
          path: .  # restore to workspace root so target/debug/* + .cache/* land correctly for dist_fixture

      - name: Run tests
        shell: bash
        run: |
          mkdir -p target/debug
          cargo nextest run \
            --archive-file ci-artifacts/tests.tar.zst \
            --workspace-remap "${{ github.workspace }}" \
            -E 'package(galoshes)'

  test-hole:
    name: Test hole (${{ matrix.os }}/${{ matrix.arch }})
    needs: build
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: windows, arch: amd64, runner: windows-latest }
          - { os: darwin,  arch: amd64, runner: macos-15-intel }
          - { os: darwin,  arch: arm64, runner: macos-latest }
    steps:
      - uses: actions/checkout@v6

      - name: Install nextest (pre-built binary)
        uses: taiki-e/install-action@v2
        with:
          tool: nextest

      - uses: actions/download-artifact@v4
        with:
          name: build-${{ matrix.os }}-${{ matrix.arch }}
          path: .  # restore to workspace root so target/debug/* + .cache/* land correctly for dist_fixture

      # Two-pass split to work around #200: the Windows TUN test
      # (`e2e_none_full_tunnel_roundtrip`) creates and destroys a
      # `hole-tun` wintun adapter, which perturbs the Azure Hyper-V
      # host's NDIS loopback packet-delivery path — once broken, it
      # stays broken for ≥120 s. So we run non-TUN tests first and
      # the TUN test last, so the break (if it fires) only affects
      # the tail of the job and not a subsequent loopback-using test.
      # Skuld's `SKULD_LABELS` env var does the filtering; see
      # `crates/bridge/src/test_support/skuld_fixtures.rs` for the
      # `TUN` label definition. Under the new per-project job layout,
      # test-hole owns its own VM — Galoshes/Garter tests on other
      # runners cannot be poisoned by TUN's NDIS perturbation.
      - name: Prepare target/debug for skuld DB
        shell: bash
        run: mkdir -p target/debug

      - name: Test (non-TUN)
        id: test-non-tun
        shell: bash
        env:
          SKULD_LABELS: "!tun"
        run: >
          cargo nextest run
          --archive-file ci-artifacts/tests.tar.zst
          --workspace-remap "${{ github.workspace }}"
          -E 'package(hole) + package(hole-bridge) + package(hole-common)
              + package(tun-engine) + package(tun-engine-macros)
              + package(dump) + package(dump-macros)
              + package(handle-holders)'

      - name: Test (TUN, runs last for #200)
        if: matrix.os == 'windows' && matrix.arch == 'amd64'
        id: test-tun
        shell: bash
        env:
          SKULD_LABELS: "tun"
        run: >
          cargo nextest run
          --archive-file ci-artifacts/tests.tar.zst
          --workspace-remap "${{ github.workspace }}"
          -E 'package(hole) + package(hole-bridge) + package(hole-common)
              + package(tun-engine) + package(tun-engine-macros)
              + package(dump) + package(dump-macros)
              + package(handle-holders)'

      # Upload bridge.log produced by `DistHarness` subprocesses. Matches
      # files that the test harness redirected to `$RUNNER_TEMP` (see
      # `crates/bridge/src/test_support/dist_harness.rs::new_tempdir`).
      - name: Upload bridge logs on test failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: bridge-logs-${{ matrix.os }}-${{ matrix.arch }}
          path: ${{ runner.temp }}/**/bridge.log
          if-no-files-found: ignore
          retention-days: 14


  test-installer:
    name: Test installer (windows/amd64)
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v7
      - uses: ./.github/actions/setup-build

      - name: Test
        working-directory: msi-installer
        run: uv run --group dev pytest -v

      - name: Build MSI
        run: uv run --directory msi-installer build

      - name: Smoke-test binary
        run: target\release\hole.exe version

      - name: Install
        shell: pwsh
        run: |
          $log = "$env:RUNNER_TEMP\msi-install.log"
          $proc = Start-Process msiexec -ArgumentList "/i","target\release\hole.msi","/quiet","/norestart","/l*vx",$log -Wait -PassThru
          if ($proc.ExitCode -ne 0) {
            Get-Content $log -Tail 50
            throw "msiexec /i failed with exit code $($proc.ExitCode)"
          }

      - name: Verify install
        shell: pwsh
        run: |
          $binDir = "C:\Program Files\hole\bin"
          foreach ($f in @("hole.exe", "v2ray-plugin.exe", "wintun.dll")) {
            if (!(Test-Path "$binDir\$f")) { throw "$f not found" }
          }
          $svc = Get-Service -Name HoleBridge -ErrorAction SilentlyContinue
          if (!$svc) { throw "HoleBridge service not registered" }
          $path = [Environment]::GetEnvironmentVariable("Path", "Machine")
          if ($path -notmatch [regex]::Escape($binDir)) { throw "$binDir not in PATH" }

      - name: Dump install log on failure
        if: failure()
        shell: pwsh
        run: |
          $log = "$env:RUNNER_TEMP\msi-install.log"
          if (Test-Path $log) { Get-Content $log -Tail 200 }

      - name: Uninstall
        if: always()
        shell: pwsh
        run: |
          $log = "$env:RUNNER_TEMP\msi-uninstall.log"
          $proc = Start-Process msiexec -ArgumentList "/x","target\release\hole.msi","/quiet","/norestart","/l*vx",$log -Wait -PassThru
          if ($proc.ExitCode -ne 0) {
            Get-Content $log -Tail 50
            Write-Warning "msiexec /x failed with exit code $($proc.ExitCode)"
          }

      - name: Verify uninstall
        if: always()
        shell: pwsh
        run: |
          $binDir = "C:\Program Files\hole\bin"
          if (Test-Path $binDir) { throw "$binDir still exists" }
          $svc = Get-Service -Name HoleBridge -ErrorAction SilentlyContinue
          if ($svc) { throw "HoleBridge service still registered" }
          $path = [Environment]::GetEnvironmentVariable("Path", "Machine")
          if ($path -match [regex]::Escape($binDir)) { throw "$binDir still in PATH" }


  cache-health:
    name: Cache health
    runs-on: ubuntu-latest
    needs: [lint, build, test-garter, test-galoshes, test-hole, test-installer]
    if: always()    # report even when prior jobs failed — those are the runs most likely to leak cache
    permissions:
      actions: read
    steps:
      - name: Warn if Actions cache above 80% of quota
        shell: python
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          # Mirrors the quota constant in cache-cleanup.yaml.
          QUOTA_BYTES: "10737418240"       # 10 GiB
          THRESHOLD_PCT: "80"
        run: |
          import json
          import os
          import subprocess

          QUOTA = int(os.environ["QUOTA_BYTES"])
          THRESHOLD_PCT = int(os.environ["THRESHOLD_PCT"])
          resp = json.loads(subprocess.run(
              ["gh", "api", "-X", "GET", f"repos/{os.environ['GH_REPO']}/actions/cache/usage"],
              check=True, capture_output=True,
          ).stdout)
          usage = resp["active_caches_size_in_bytes"]
          count = resp["active_caches_count"]
          pct = usage * 100 // QUOTA
          size_mb = usage // 1024 // 1024
          print(f"Cache usage: {size_mb} MB across {count} entries ({pct}% of {QUOTA // 1024 // 1024} MB quota)")
          if pct >= THRESHOLD_PCT:
              print(
                  f"::warning title=Actions cache filling up"
                  f"::Cache at {pct}% of quota ({size_mb} MB, {count} entries). "
                  f"cache-cleanup.yaml prunes stale entries nightly at 03:15 UTC; "
                  f"manual trigger: gh workflow run cache-cleanup.yaml"
              )
