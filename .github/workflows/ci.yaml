name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  lint:
    name: Lint
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"
      - uses: astral-sh/setup-uv@v7

      - uses: ./.github/actions/setup-build

      - name: Install prek
        run: uv tool install prek

      - name: Run linters
        run: prek run --all-files --show-diff-on-failure

  test:
    name: Test (${{ matrix.os }}/${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: windows, arch: amd64, runner: windows-latest }
          - { os: darwin,  arch: amd64, runner: macos-15-intel }
          - { os: darwin,  arch: arm64, runner: macos-latest }
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup-build

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      # cargo clippy uses `cargo check`, which leaves binary outputs under
      # `target/debug/deps/hole-<hash>.exe` but does NOT create the
      # top-level `target/debug/hole[.exe]` copy. The bridge crate's e2e
      # test fixture (`dist_dir`) calls `xtask::run_stage` to hardlink
      # `target/debug/hole[.exe]` into `target/debug/dist/bin/`, so we
      # need a real `cargo build` to produce it.
      - name: Build workspace (for dist-dir test fixture)
        run: cargo build --workspace

      - uses: cargo-bins/cargo-binstall@v1.18.1

      - name: Install nextest
        shell: bash
        env:
          # Authenticated GitHub API has a 5000 req/h limit; without this,
          # binstall can hit the 60 req/h unauthenticated limit and fall
          # back to `cargo install`, which fails because nextest's
          # `locked-tripwire` crate requires --locked.
          GITHUB_TOKEN: ${{ github.token }}
        run: cargo binstall --no-confirm --locked cargo-nextest

      # Two-pass split to work around #200: the Windows TUN test
      # (`e2e_none_full_tunnel_roundtrip`) creates and destroys a
      # `hole-tun` wintun adapter, which perturbs the Azure Hyper-V
      # host's NDIS loopback packet-delivery path — once broken, it
      # stays broken for ≥120 s. So we run non-TUN tests first and
      # the TUN test last, so the break (if it fires) only affects
      # the tail of the job and not a subsequent loopback-using test.
      # Skuld's `SKULD_LABELS` env var does the filtering; see
      # `crates/bridge/src/test_support/skuld_fixtures.rs` for the
      # `TUN` label definition.
      - name: Test (non-TUN)
        id: test-non-tun
        shell: bash
        env:
          SKULD_LABELS: "!tun"
        run: cargo nextest run --workspace

      # `external/galoshes/` is a vendored sub-workspace (hole's root Cargo.toml
      # has `exclude = ["external/galoshes"]`), so the steps above don't cover
      # it. Run garter's tests explicitly to catch regressions in the vendored
      # copy — e.g. the `drain_timeout` bug that silently killed v2ray-plugin
      # ~5s after proxy start (bindreams/galoshes#19). Scoped to `-p garter` so
      # we don't require the Go toolchain for galoshes/build.rs's v2ray-plugin
      # binary. Runs BEFORE the TUN step on Windows because the TUN step breaks
      # NDIS loopback for ≥120s (see #200/#207), and garter's integration tests
      # bind 127.0.0.1 listeners. The mock-plugin prebuild mirrors galoshes'
      # own CI pattern — `chain_integration.rs` shells out to `cargo build -p
      # mock-plugin` at runtime, and prebuilding keeps the test's cargo-within-
      # nextest invocation predictable.
      - name: Build galoshes mock-plugin (vendored sub-workspace)
        shell: bash
        run: cargo build --manifest-path external/galoshes/Cargo.toml -p mock-plugin

      - name: Test galoshes (vendored sub-workspace, garter only)
        shell: bash
        run: cargo nextest run --manifest-path external/galoshes/Cargo.toml -p garter

      - name: Test (TUN, runs last for #200)
        id: test-tun
        if: matrix.os == 'windows'
        shell: bash
        env:
          SKULD_LABELS: "tun"
        run: cargo nextest run --workspace

      # Upload bridge.log produced by `DistHarness` subprocesses. Matches
      # files that the test harness redirected to `$RUNNER_TEMP` (see
      # `crates/bridge/src/test_support/dist_harness.rs::new_tempdir`).
      - name: Upload bridge logs on test failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: bridge-logs-${{ matrix.os }}-${{ matrix.arch }}
          path: ${{ runner.temp }}/**/bridge.log
          if-no-files-found: ignore
          retention-days: 14


  test-installer:
    name: Test installer (windows/amd64)
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v7
      - uses: ./.github/actions/setup-build

      - name: Test
        working-directory: msi-installer
        run: uv run --group dev pytest -v

      - name: Build MSI
        run: uv run --directory msi-installer build

      - name: Smoke-test binary
        run: target\release\hole.exe version

      - name: Install
        shell: pwsh
        run: |
          $log = "$env:RUNNER_TEMP\msi-install.log"
          $proc = Start-Process msiexec -ArgumentList "/i","target\release\hole.msi","/quiet","/norestart","/l*vx",$log -Wait -PassThru
          if ($proc.ExitCode -ne 0) {
            Get-Content $log -Tail 50
            throw "msiexec /i failed with exit code $($proc.ExitCode)"
          }

      - name: Verify install
        shell: pwsh
        run: |
          $binDir = "C:\Program Files\hole\bin"
          foreach ($f in @("hole.exe", "v2ray-plugin.exe", "wintun.dll")) {
            if (!(Test-Path "$binDir\$f")) { throw "$f not found" }
          }
          $svc = Get-Service -Name HoleBridge -ErrorAction SilentlyContinue
          if (!$svc) { throw "HoleBridge service not registered" }
          $path = [Environment]::GetEnvironmentVariable("Path", "Machine")
          if ($path -notmatch [regex]::Escape($binDir)) { throw "$binDir not in PATH" }

      - name: Dump install log on failure
        if: failure()
        shell: pwsh
        run: |
          $log = "$env:RUNNER_TEMP\msi-install.log"
          if (Test-Path $log) { Get-Content $log -Tail 200 }

      - name: Uninstall
        if: always()
        shell: pwsh
        run: |
          $log = "$env:RUNNER_TEMP\msi-uninstall.log"
          $proc = Start-Process msiexec -ArgumentList "/x","target\release\hole.msi","/quiet","/norestart","/l*vx",$log -Wait -PassThru
          if ($proc.ExitCode -ne 0) {
            Get-Content $log -Tail 50
            Write-Warning "msiexec /x failed with exit code $($proc.ExitCode)"
          }

      - name: Verify uninstall
        if: always()
        shell: pwsh
        run: |
          $binDir = "C:\Program Files\hole\bin"
          if (Test-Path $binDir) { throw "$binDir still exists" }
          $svc = Get-Service -Name HoleBridge -ErrorAction SilentlyContinue
          if ($svc) { throw "HoleBridge service still registered" }
          $path = [Environment]::GetEnvironmentVariable("Path", "Machine")
          if ($path -match [regex]::Escape($binDir)) { throw "$binDir still in PATH" }


  cache-health:
    name: Cache health
    runs-on: ubuntu-latest
    needs: [lint, test, test-installer]
    if: always()    # report even when prior jobs failed — those are the runs most likely to leak cache
    permissions:
      actions: read
    steps:
      - name: Warn if Actions cache above 80% of quota
        shell: python
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          # Mirrors the quota constant in cache-cleanup.yaml.
          QUOTA_BYTES: "10737418240"       # 10 GiB
          THRESHOLD_PCT: "80"
        run: |
          import json
          import os
          import subprocess

          QUOTA = int(os.environ["QUOTA_BYTES"])
          THRESHOLD_PCT = int(os.environ["THRESHOLD_PCT"])
          resp = json.loads(subprocess.run(
              ["gh", "api", "-X", "GET", f"repos/{os.environ['GH_REPO']}/actions/cache/usage"],
              check=True, capture_output=True,
          ).stdout)
          usage = resp["active_caches_size_in_bytes"]
          count = resp["active_caches_count"]
          pct = usage * 100 // QUOTA
          size_mb = usage // 1024 // 1024
          print(f"Cache usage: {size_mb} MB across {count} entries ({pct}% of {QUOTA // 1024 // 1024} MB quota)")
          if pct >= THRESHOLD_PCT:
              print(
                  f"::warning title=Actions cache filling up"
                  f"::Cache at {pct}% of quota ({size_mb} MB, {count} entries). "
                  f"cache-cleanup.yaml prunes stale entries nightly at 03:15 UTC; "
                  f"manual trigger: gh workflow run cache-cleanup.yaml"
              )
