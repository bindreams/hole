name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    name: Lint
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"
      - uses: astral-sh/setup-uv@v7

      - uses: ./.github/actions/setup-build

      - name: Install prek
        run: uv tool install prek

      - name: Run linters
        run: prek run --all-files --show-diff-on-failure

  test:
    name: Test (${{ matrix.os }}/${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: windows, arch: amd64, runner: windows-latest }
          - { os: darwin,  arch: amd64, runner: macos-15-intel }
          - { os: darwin,  arch: arm64, runner: macos-latest }
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup-build

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      # cargo clippy uses `cargo check`, which leaves binary outputs under
      # `target/debug/deps/hole-<hash>.exe` but does NOT create the
      # top-level `target/debug/hole[.exe]` copy. The bridge crate's e2e
      # test fixture (`dist_dir`) calls `xtask::run_stage` to hardlink
      # `target/debug/hole[.exe]` into `target/debug/dist/bin/`, so we
      # need a real `cargo build` to produce it.
      - name: Build workspace (for dist-dir test fixture)
        run: cargo build --workspace

      - uses: cargo-bins/cargo-binstall@v1.18.1

      - name: Install nextest
        shell: bash
        env:
          # Authenticated GitHub API has a 5000 req/h limit; without this,
          # binstall can hit the 60 req/h unauthenticated limit and fall
          # back to `cargo install`, which fails because nextest's
          # `locked-tripwire` crate requires --locked.
          GITHUB_TOKEN: ${{ github.token }}
        run: cargo binstall --no-confirm --locked cargo-nextest

      - name: Test
        id: test
        shell: bash
        run: cargo nextest run --workspace


  test-installer:
    name: Test installer (windows/amd64)
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v7
      - uses: ./.github/actions/setup-build

      - name: Test
        working-directory: msi-installer
        run: uv run --group dev pytest -v

      - name: Build MSI
        run: uv run --directory msi-installer build

      - name: Smoke-test binary
        run: target\release\hole.exe version

      - name: Install
        shell: pwsh
        run: |
          $log = "$env:RUNNER_TEMP\msi-install.log"
          $proc = Start-Process msiexec -ArgumentList "/i","target\release\hole.msi","/quiet","/norestart","/l*vx",$log -Wait -PassThru
          if ($proc.ExitCode -ne 0) {
            Get-Content $log -Tail 50
            throw "msiexec /i failed with exit code $($proc.ExitCode)"
          }

      - name: Verify install
        shell: pwsh
        run: |
          $binDir = "C:\Program Files\hole\bin"
          foreach ($f in @("hole.exe", "v2ray-plugin.exe", "wintun.dll")) {
            if (!(Test-Path "$binDir\$f")) { throw "$f not found" }
          }
          $svc = Get-Service -Name HoleBridge -ErrorAction SilentlyContinue
          if (!$svc) { throw "HoleBridge service not registered" }
          $path = [Environment]::GetEnvironmentVariable("Path", "Machine")
          if ($path -notmatch [regex]::Escape($binDir)) { throw "$binDir not in PATH" }

      - name: Dump install log on failure
        if: failure()
        shell: pwsh
        run: |
          $log = "$env:RUNNER_TEMP\msi-install.log"
          if (Test-Path $log) { Get-Content $log -Tail 200 }

      - name: Uninstall
        if: always()
        shell: pwsh
        run: |
          $log = "$env:RUNNER_TEMP\msi-uninstall.log"
          $proc = Start-Process msiexec -ArgumentList "/x","target\release\hole.msi","/quiet","/norestart","/l*vx",$log -Wait -PassThru
          if ($proc.ExitCode -ne 0) {
            Get-Content $log -Tail 50
            Write-Warning "msiexec /x failed with exit code $($proc.ExitCode)"
          }

      - name: Verify uninstall
        if: always()
        shell: pwsh
        run: |
          $binDir = "C:\Program Files\hole\bin"
          if (Test-Path $binDir) { throw "$binDir still exists" }
          $svc = Get-Service -Name HoleBridge -ErrorAction SilentlyContinue
          if ($svc) { throw "HoleBridge service still registered" }
          $path = [Environment]::GetEnvironmentVariable("Path", "Machine")
          if ($path -match [regex]::Escape($binDir)) { throw "$binDir still in PATH" }


  cache-health:
    name: Cache health
    runs-on: ubuntu-latest
    needs: [lint, test, test-installer]
    if: always()    # report even when prior jobs failed — those are the runs most likely to leak cache
    permissions:
      actions: read
    steps:
      - name: Warn if Actions cache above 80% of quota
        shell: python
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          # Mirrors the quota constant in cache-cleanup.yaml.
          QUOTA_BYTES: "10737418240"       # 10 GiB
          THRESHOLD_PCT: "80"
        run: |
          import json
          import os
          import subprocess

          QUOTA = int(os.environ["QUOTA_BYTES"])
          THRESHOLD_PCT = int(os.environ["THRESHOLD_PCT"])
          resp = json.loads(subprocess.run(
              ["gh", "api", "-X", "GET", f"repos/{os.environ['GH_REPO']}/actions/cache/usage"],
              check=True, capture_output=True,
          ).stdout)
          usage = resp["active_caches_size_in_bytes"]
          count = resp["active_caches_count"]
          pct = usage * 100 // QUOTA
          size_mb = usage // 1024 // 1024
          print(f"Cache usage: {size_mb} MB across {count} entries ({pct}% of {QUOTA // 1024 // 1024} MB quota)")
          if pct >= THRESHOLD_PCT:
              print(
                  f"::warning title=Actions cache filling up"
                  f"::Cache at {pct}% of quota ({size_mb} MB, {count} entries). "
                  f"cache-cleanup.yaml prunes stale entries nightly at 03:15 UTC; "
                  f"manual trigger: gh workflow run cache-cleanup.yaml"
              )
