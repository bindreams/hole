name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  lint:
    name: Lint
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"
      - uses: astral-sh/setup-uv@v8.1.0

      - uses: ./.github/actions/setup-build

      - name: Install prek
        run: uv tool install prek

      # cargo-clippy is skipped here because it's run per-platform in the
      # build job (see ci.yaml below). cargo-fmt stays active — it is
      # platform-independent, one Windows invocation covers the workspace.
      # SKIP=cargo-clippy lives in the prek target's `run.environment:`.
      - name: Run linters
        run: cargo xtask run prek

  # Per-platform build job: compiles clippy + test binaries once and publishes
  # them as a platform-scoped artifact (`build-<os>-<arch>`). Test jobs below
  # download the archive and run filtered tests without invoking the Rust
  # toolchain. See .tmp/claude/plans/i-want-to-refactor-polymorphic-catmull.md
  # for the full design (esp. the matrix `needs:` trade-off: compile errors
  # in any crate fail `build[P]` and skip all `test-*[P]` cells).
  build:
    name: Build (${{ matrix.os }}/${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: windows, arch: amd64, runner: windows-latest }
          - { os: darwin,  arch: amd64, runner: macos-15-intel }
          - { os: darwin,  arch: arm64, runner: macos-latest }
          - { os: linux,   arch: amd64, runner: ubuntu-latest }
          - { os: linux,   arch: arm64, runner: ubuntu-24.04-arm }
          - { os: windows, arch: arm64, runner: windows-11-arm }
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup-build

      - uses: cargo-bins/cargo-binstall@v1.19.1

      - name: Install nextest
        shell: bash
        env:
          # Authenticated GitHub API has a 5000 req/h limit; without this,
          # binstall can hit the 60 req/h unauthenticated limit and fall
          # back to `cargo install`, which fails because nextest's
          # `locked-tripwire` crate requires --locked.
          GITHUB_TOKEN: ${{ github.token }}
        run: cargo binstall --no-confirm --locked cargo-nextest

      # Clippy coverage is platform-gated by the targets' `platforms:` lists.
      # `clippy-hole` covers Hole platforms (windows/amd64, darwin/*) with
      # `--workspace`; `clippy-ex-galoshes` covers the platforms Hole doesn't
      # ship on (linux/*, windows/arm64) with the ex-Galoshes -p filter set.
      # The `if:` gates here just suppress the "doesn't apply to host" error
      # from xtask on the wrong-platform half of the matrix.
      - name: Clippy (Hole workspace)
        if: matrix.os == 'darwin' || (matrix.os == 'windows' && matrix.arch == 'amd64')
        run: cargo xtask run clippy-hole

      - name: Clippy (ex-Galoshes only)
        if: matrix.os == 'linux' || (matrix.os == 'windows' && matrix.arch == 'arm64')
        run: cargo xtask run clippy-ex-galoshes

      # Archive only the ex-Galoshes crates — they're the only consumers
      # via test-garter and test-galoshes on all platforms. Hole crates'
      # compileability is already covered by `Clippy (Hole workspace)`
      # above; test-hole runs in its own build+test job below.
      - name: Build test archive (ex-Galoshes crates)
        shell: bash
        run: |
          mkdir -p ci-artifacts
          cargo nextest archive -p garter -p garter-bin -p galoshes -p mock-plugin --archive-file ci-artifacts/tests.tar.zst

      # The artifact is consumed by test-garter and test-galoshes only;
      # test-hole does its own build (#266 tracks unifying that).
      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: build-${{ matrix.os }}-${{ matrix.arch }}
          path: ci-artifacts/tests.tar.zst
          retention-days: 3
          if-no-files-found: error

  # Three per-project test jobs, all consuming the `build-<os>-<arch>` artifact
  # and running `cargo nextest run --archive-file`. They install the nextest
  # binary via taiki-e/install-action (no Rust toolchain needed) and skip the
  # `setup-build` composite action entirely.
  test-garter:
    name: Test garter (${{ matrix.os }}/${{ matrix.arch }})
    needs: build
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: windows, arch: amd64, runner: windows-latest }
          - { os: darwin,  arch: amd64, runner: macos-15-intel }
          - { os: darwin,  arch: arm64, runner: macos-latest }
          - { os: linux,   arch: amd64, runner: ubuntu-latest }
          - { os: linux,   arch: arm64, runner: ubuntu-24.04-arm }
          - { os: windows, arch: arm64, runner: windows-11-arm }
    steps:
      - uses: actions/checkout@v6

      - name: Install nextest (pre-built binary)
        uses: taiki-e/install-action@v2
        with:
          tool: nextest

      - uses: actions/download-artifact@v8
        with:
          name: build-${{ matrix.os }}-${{ matrix.arch }}
          path: ci-artifacts

      # `cargo nextest run --archive-file` refuses `-p`; the archive's
      # package set is frozen at build time. Filter by `-E package(...)`
      # instead. `target/debug/` must exist because skuld writes its
      # test-coordination SQLite DB at `<workspace>/target/debug/.skuld.db`.
      - name: Run tests
        shell: bash
        run: |
          mkdir -p target/debug
          cargo nextest run \
            --archive-file ci-artifacts/tests.tar.zst \
            --workspace-remap "${{ github.workspace }}" \
            -E 'package(garter) + package(garter-bin) + package(mock-plugin)'

  test-galoshes:
    name: Test galoshes (${{ matrix.os }}/${{ matrix.arch }})
    needs: build
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: windows, arch: amd64, runner: windows-latest }
          - { os: darwin,  arch: amd64, runner: macos-15-intel }
          - { os: darwin,  arch: arm64, runner: macos-latest }
          - { os: linux,   arch: amd64, runner: ubuntu-latest }
          - { os: linux,   arch: arm64, runner: ubuntu-24.04-arm }
          - { os: windows, arch: arm64, runner: windows-11-arm }
    steps:
      - uses: actions/checkout@v6

      - name: Install nextest (pre-built binary)
        uses: taiki-e/install-action@v2
        with:
          tool: nextest

      - uses: actions/download-artifact@v8
        with:
          name: build-${{ matrix.os }}-${{ matrix.arch }}
          path: ci-artifacts

      - name: Run tests
        shell: bash
        run: |
          mkdir -p target/debug
          cargo nextest run \
            --archive-file ci-artifacts/tests.tar.zst \
            --workspace-remap "${{ github.workspace }}" \
            -E 'package(galoshes)'

  # test-hole runs a fresh build + nextest run (no archive). Hole tests have
  # too many environmental couplings (trybuild --offline registry, dist_fixture
  # workspace state, ipc_tests) for the archive-then-test pattern to work
  # reliably without significant additional plumbing. #266 tracks moving
  # test-hole onto archive once the couplings are addressed; for now this
  # matches the pre-refactor build+test shape, scoped to Hole crates.
  test-hole:
    name: Test hole (${{ matrix.os }}/${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: windows, arch: amd64, runner: windows-latest }
          - { os: darwin,  arch: amd64, runner: macos-15-intel }
          - { os: darwin,  arch: arm64, runner: macos-latest }
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup-build

      - uses: cargo-bins/cargo-binstall@v1.19.1

      - name: Install nextest
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: cargo binstall --no-confirm --locked cargo-nextest

      # Compile test binaries via the orchestrator (resolves the full DAG:
      # ex-ray → galoshes → wintun → hole → hole-tests) but don't run
      # them yet — running tests is not part of the build process. The two
      # nextest invocations below execute the pre-built binaries with
      # different SKULD_LABELS filters; see #200 for the NDIS-loopback
      # corruption that motivates running TUN tests last (Windows only).
      - name: Build hole test binaries
        shell: bash
        run: cargo xtask build hole-tests

      # `--no-default-features` mirrors the `hole-tests` xtask target. Without
      # it Cargo recompiles `hole` with `tauri/custom-protocol` ON (different
      # feature set → different fingerprint → fresh build), which expands
      # `tauri::generate_context!()` in production mode and panics on
      # missing `ui/dist/`. See bindreams/hole#372.
      - name: Test (non-TUN)
        id: test-non-tun
        shell: bash
        env:
          SKULD_LABELS: "!tun"
        run: >
          cargo nextest run --no-default-features
          -E 'package(hole) + package(hole-bridge) + package(hole-common)
              + package(tun-engine) + package(tun-engine-macros)
              + package(dump) + package(dump-macros)
              + package(handle-holders)'

      - name: Test (TUN, runs last for #200)
        if: matrix.os == 'windows' && matrix.arch == 'amd64'
        id: test-tun
        shell: bash
        env:
          SKULD_LABELS: "tun"
        run: >
          cargo nextest run --no-default-features
          -E 'package(hole) + package(hole-bridge) + package(hole-common)
              + package(tun-engine) + package(tun-engine-macros)
              + package(dump) + package(dump-macros)
              + package(handle-holders)'

      # Upload bridge.log produced by `DistHarness` subprocesses. Matches
      # files that the test harness redirected to `$RUNNER_TEMP` (see
      # `crates/bridge/src/test_support/dist_harness.rs::new_tempdir`).
      - name: Upload bridge logs on test failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: bridge-logs-${{ matrix.os }}-${{ matrix.arch }}
          path: ${{ runner.temp }}/**/bridge.log
          if-no-files-found: ignore
          retention-days: 14


  test-installer:
    name: Test installer (windows/amd64)
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v8.1.0
      - uses: ./.github/actions/setup-build

      - name: Test
        working-directory: msi-installer
        run: uv run --group dev pytest -v

      - name: Build MSI
        run: cargo xtask build hole-msi

      - name: Smoke-test binary
        run: target\release\hole.exe version

      - name: Install
        shell: pwsh
        run: |
          $log = "$env:RUNNER_TEMP\msi-install.log"
          $proc = Start-Process msiexec -ArgumentList "/i","target\release\hole.msi","/quiet","/norestart","/l*vx",$log -Wait -PassThru
          if ($proc.ExitCode -ne 0) {
            Get-Content $log -Tail 50
            throw "msiexec /i failed with exit code $($proc.ExitCode)"
          }

      - name: Verify install
        shell: pwsh
        run: |
          $binDir = "C:\Program Files\hole\bin"
          foreach ($f in @("hole.exe", "ex-ray.exe", "wintun.dll")) {
            if (!(Test-Path "$binDir\$f")) { throw "$f not found" }
          }
          $svc = Get-Service -Name HoleBridge -ErrorAction SilentlyContinue
          if (!$svc) { throw "HoleBridge service not registered" }
          $path = [Environment]::GetEnvironmentVariable("Path", "Machine")
          if ($path -notmatch [regex]::Escape($binDir)) { throw "$binDir not in PATH" }

      # WebDriverIO smoke test against the INSTALLED binary, gating
      # bindreams/hole#372 (dashboard loads bundled frontend, not the
      # WebView2 "localhost refused" error page).
      #
      # tauri-driver is installed via `cargo install`; the cargo registry
      # cache + sccache from setup-build keep this fast across runs.
      # `--locked` and a pinned version guard against flakes from
      # unrelated bumps in the tauri-driver crate.
      - name: Install tauri-driver
        run: cargo install --locked --version 2.0.6 tauri-driver

      # tauri-driver speaks to WebView2 via Microsoft Edge's WebDriver.
      # The runner's bundled msedgedriver (`$EDGEWEBDRIVER`) targets the
      # Edge BROWSER version on the image, but WebView2 RUNTIME (which
      # hole.exe actually loads) auto-updates independently and is
      # typically a higher version — msedgedriver then rejects the
      # session with "only supports Microsoft Edge version N". Detect
      # the installed WebView2 runtime version and download the matching
      # msedgedriver from Microsoft's CDN. See bindreams/hole#372.
      - name: Install msedgedriver matching WebView2 runtime
        shell: pwsh
        run: |
          $key = "HKLM:\SOFTWARE\WOW6432Node\Microsoft\EdgeUpdate\Clients\{F3017226-FE2A-4295-8BDF-00C3A9A7E4C5}"
          $webview2 = (Get-ItemProperty -Path $key -Name pv).pv
          Write-Host "WebView2 runtime version: $webview2"
          $url = "https://msedgedriver.microsoft.com/$webview2/edgedriver_win64.zip"
          $zip = "$env:RUNNER_TEMP\edgedriver.zip"
          $out = "$env:RUNNER_TEMP\edgedriver"
          Invoke-WebRequest -Uri $url -OutFile $zip
          Expand-Archive -Path $zip -DestinationPath $out -Force
          Add-Content -Path $env:GITHUB_PATH -Value $out

      # The MSI's `LaunchApp` custom action runs `hole.exe --show-dashboard`
      # after a fresh install. Tauri's single-instance plugin would route
      # tauri-driver's new launch into that already-running instance, so we
      # need a clean slate. `Stop-Process -Force` calls `TerminateProcess`
      # synchronously; the subsequent `Wait-Process -ErrorAction Ignore`
      # waits for the process object to be reaped without depending on a
      # wall-clock delay.
      - name: Kill any running hole.exe (post-install LaunchApp)
        shell: pwsh
        run: |
          Get-Process hole -ErrorAction SilentlyContinue | Stop-Process -Force
          Wait-Process -Name hole -ErrorAction SilentlyContinue

      # Reuse the `node_modules/` left by `frontend-build` during
      # `cargo xtask build hole-msi`. WDIO is in devDependencies; the
      # configured `tauri:options.application` is overridden via env var
      # to point at the installed binary, not the workspace's release.
      - name: E2E dashboard test
        env:
          HOLE_TEST_APP_PATH: 'C:\Program Files\hole\bin\hole.exe'
        run: npm run test:e2e

      - name: Kill hole.exe after E2E
        if: always()
        shell: pwsh
        run: |
          Get-Process hole -ErrorAction SilentlyContinue | Stop-Process -Force

      - name: Dump install log on failure
        if: failure()
        shell: pwsh
        run: |
          $log = "$env:RUNNER_TEMP\msi-install.log"
          if (Test-Path $log) { Get-Content $log -Tail 200 }

      - name: Uninstall
        if: always()
        shell: pwsh
        run: |
          $log = "$env:RUNNER_TEMP\msi-uninstall.log"
          $proc = Start-Process msiexec -ArgumentList "/x","target\release\hole.msi","/quiet","/norestart","/l*vx",$log -Wait -PassThru
          if ($proc.ExitCode -ne 0) {
            Get-Content $log -Tail 50
            Write-Warning "msiexec /x failed with exit code $($proc.ExitCode)"
          }

      - name: Verify uninstall
        if: always()
        shell: pwsh
        run: |
          $binDir = "C:\Program Files\hole\bin"
          if (Test-Path $binDir) { throw "$binDir still exists" }
          $svc = Get-Service -Name HoleBridge -ErrorAction SilentlyContinue
          if ($svc) { throw "HoleBridge service still registered" }
          $path = [Environment]::GetEnvironmentVariable("Path", "Machine")
          if ($path -match [regex]::Escape($binDir)) { throw "$binDir still in PATH" }

  # Darwin-only counterpart to `test-installer`: build the DMG and run the
  # signature-consistency tests in `dmg-installer/`. Catches issue #364 —
  # an unsigned .app bundle that launches "damaged" under Gatekeeper
  # quarantine. Always runs (no path filter) so this stays a stable
  # required check on every PR.
  test-dmg-signing:
    name: Test DMG signing (${{ matrix.os }}/${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: darwin, arch: amd64, runner: macos-15-intel }
          - { os: darwin, arch: arm64, runner: macos-latest }
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v8.1.0
      - uses: ./.github/actions/setup-build

      # `npx tauri build` (under `hole-dmg`) runs `npm install` itself via
      # `beforeBuildCommand` in tauri.conf.json. Node.js is provided by
      # `setup-build` above. See bindreams/hole#372.
      - name: Build DMG
        run: cargo xtask build hole-dmg

      - name: Test DMG signing
        run: cargo xtask run hole-dmg-tests

  # Renovate npm safety gate: builds the Vite bundle (via `cargo xtask build
  # frontend-build`) and type-checks (via `cargo xtask run frontend-check`,
  # which does its own `npm ci` + `npm run check` — tsc reads source directly
  # so it doesn't need the Vite bundle as a dep). Both steps are required
  # status checks for npm dependency PRs to automerge — see
  # .github/renovate.json. Single platform: `npm run check` / `vite build`
  # are platform-independent; the per-OS Tauri shell is exercised by the
  # release pipeline.
  frontend-check:
    name: Frontend check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: package.json
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        id: rust-toolchain

      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-${{ runner.os }}-${{ steps.rust-toolchain.outputs.cachekey }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: cargo-${{ runner.os }}-${{ steps.rust-toolchain.outputs.cachekey }}-

      - name: Build frontend
        run: cargo xtask build frontend-build

      - name: Type-check frontend
        run: cargo xtask run frontend-check
