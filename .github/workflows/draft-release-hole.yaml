name: Draft Release (hole)

on:
  workflow_dispatch:
    inputs: &inputs
      version:
        description: "hole release version (e.g. 1.0.0)"
        required: true
        type: string
  workflow_call:
    inputs: *inputs

permissions:
  contents: write

jobs:
  validate:
    name: Validate version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable

      - name: Normalize and validate version
        id: version
        run: |
          V="${{ inputs.version }}"
          V="${V#v}"
          [[ "$V" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]] || { echo "::error::Invalid version: '${{ inputs.version }}'"; exit 1; }
          echo "version=$V" >> "$GITHUB_OUTPUT"

      - name: Create local tag for build
        run: git tag "releases/hole/v${{ steps.version.outputs.version }}"

      - name: Validate Cargo.toml matches version
        run: cargo xtask version --check --exact --group hole

  build:
    name: Build (${{ matrix.os }}/${{ matrix.arch }})
    needs: validate
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: true
      matrix:
        include:
          - { os: windows, arch: amd64, runner: windows-latest, ext: msi }
          - { os: darwin,  arch: arm64, runner: macos-latest,   ext: dmg }
          - { os: darwin,  arch: amd64, runner: macos-15-intel, ext: dmg }
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Create local tag for build
        run: git tag "releases/hole/v${{ needs.validate.outputs.version }}"

      - uses: astral-sh/setup-uv@v7
        if: matrix.os == 'windows'

      - uses: ./.github/actions/setup-build

      # Frontend deps + Node toolchain — needed by the macOS DMG path
      # (`npx tauri build`). Cheap on Windows runners; unconditional to
      # keep the workflow flat.
      - uses: actions/setup-node@v6
        if: matrix.os == 'darwin'
        with:
          node-version-file: package.json
      - name: Install npm dependencies
        if: matrix.os == 'darwin'
        run: npm install

      # Single matrix-driven build call: `hole-msi` on Windows, `hole-dmg`
      # on Darwin. The orchestrator (build.yaml) owns the per-platform
      # recipe — this step has no per-os `if:` because the target name
      # carries the platform information.
      - name: Build artifact
        shell: bash
        run: cargo xtask build "hole-${{ matrix.ext }}"

      # Rename and hash
      - name: Rename artifact and compute SHA-256
        shell: bash
        run: |
          VERSION="${{ needs.validate.outputs.version }}"
          ASSET="hole-${VERSION}-${{ matrix.os }}-${{ matrix.arch }}.${{ matrix.ext }}"

          if [ "${{ matrix.os }}" = "windows" ]; then
            mv target/release/hole.msi "$ASSET"
          else
            mv target/release/bundle/dmg/*.dmg "$ASSET"
          fi

          sha256sum "$ASSET" > "${ASSET}.sha256line"
          echo "Artifact: $ASSET"
          cat "${ASSET}.sha256line"

      - uses: actions/upload-artifact@v7
        with:
          name: release-${{ matrix.os }}-${{ matrix.arch }}
          path: |
            hole-*.${{ matrix.ext }}
            hole-*.${{ matrix.ext }}.sha256line

  release:
    name: Create draft release
    needs: [validate, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: release-*
          merge-multiple: true

      - name: Assemble SHA256SUMS
        run: |
          cat *.sha256line > SHA256SUMS
          rm *.sha256line

          lines=$(wc -l < SHA256SUMS)
          if [ "$lines" -ne 3 ]; then
            echo "::error::Expected 3 entries in SHA256SUMS, got $lines"
            exit 1
          fi

          echo "SHA256SUMS:"
          cat SHA256SUMS

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          # `path: source` so we don't clobber the downloaded artifacts in $GITHUB_WORKSPACE.
          path: source

      - uses: astral-sh/setup-uv@v7

      - name: Generate per-track release notes
        run: |
          VERSION="${{ needs.validate.outputs.version }}"
          TAG="releases/hole/v${VERSION}"
          uv run source/scripts/generate-release-notes.py hole \
            --new-tag "$TAG" \
            --head "${{ github.sha }}" \
            --repo-root source \
            > release-notes.md
          echo "--- release-notes.md ---"
          cat release-notes.md
          echo "--- end ---"

      - name: Create draft release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          VERSION="${{ needs.validate.outputs.version }}"
          TAG="releases/hole/v${VERSION}"
          gh release create "$TAG" \
            --draft \
            --notes-file release-notes.md \
            --title "hole v${VERSION}" \
            --target "${{ github.sha }}" \
            hole-* SHA256SUMS
          echo "Draft release created: https://github.com/${{ github.repository }}/releases/tag/$TAG"
