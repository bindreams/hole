# Per-track release notes config for the `galoshes` release group.
# Consumed by scripts/generate-release-notes.py at release time.
#
# See CONTRIBUTING.md "Commit messages — Conventional Commits".

initial_release: |
  Initial release of the standalone `galoshes` SIP003u plugin for
  shadowsocks server operators. See #291 for the four-track release
  decoupling rationale.

include_paths:
  # Note: crates/garter/** was removed from this list in #312. Garter
  # changes belong in garter release notes; galoshes consumers wanting
  # garter-library detail can read the garter release notes directly.
  - crates/galoshes/**
  - external/v2ray-plugin/**
  - .github/workflows/draft-release-galoshes.yaml
  - .github/workflows/publish-release-galoshes.yaml
  - .github/release-galoshes.yaml
  # Workspace-engineering files affect every release track. See #312.
  - xtask/**
  - xtask-lib/**
  - scripts/generate-release-notes.py
  - Cargo.toml
  - Cargo.lock
  - build.yaml
  - prek.toml
  - clippy.toml

categories:
  - title: "🚀 Features"
    types: [feat]
  - title: "🐛 Bug Fixes"
    types: [fix]
  - title: "⚡ Performance"
    types: [perf]
  - title: "♻️ Refactors"
    types: [refactor]
  - title: "📚 Documentation"
    types: [docs]
  - title: "🔧 Build & CI"
    types: [build, ci]
  - title: "🧪 Tests"
    types: [test]
  - title: "🧹 Chores"
    types: [chore, style, revert]
  - title: "Other"
    types: []
