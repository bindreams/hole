name: Setup Build
description: Set up a compilable Rust workspace (toolchains, cache, runtime deps)

runs:
  using: composite
  steps:
    - name: Set cargo env vars
      shell: bash
      run: |
        echo "CARGO_TERM_COLOR=always" >> "$GITHUB_ENV"
        echo "SCCACHE_GHA_ENABLED=true" >> "$GITHUB_ENV"
        echo "RUSTC_WRAPPER=sccache" >> "$GITHUB_ENV"

    - uses: dtolnay/rust-toolchain@stable
      id: rust-toolchain
      with:
        components: clippy, rustfmt

    - uses: actions/setup-go@v6
      with:
        go-version: stable

    # Node.js is required by the `frontend-build` xtask target, which is now
    # on `hole-msi.depends`. Without `npm`, Windows runners can't produce
    # `ui/dist/` and `tauri-codegen` panics at compile time when
    # `tauri/custom-protocol` is enabled. Pinned via `package.json`'s
    # `"engines": { "node": ">=24.0.0 <25.0.0" }`. See bindreams/hole#372.
    - uses: actions/setup-node@v7
      with:
        node-version-file: package.json
        cache: npm

    - uses: actions/cache@v6
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
        key: cargo-${{ runner.os }}-${{ steps.rust-toolchain.outputs.cachekey }}-${{ hashFiles('Cargo.lock') }}
        restore-keys: cargo-${{ runner.os }}-${{ steps.rust-toolchain.outputs.cachekey }}-

    - uses: mozilla-actions/sccache-action@v0.0.10

    - name: Fetch runtime deps (ex-ray, wintun)
      shell: bash
      run: cargo xtask deps
