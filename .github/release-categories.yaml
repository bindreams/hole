# Shared category schema for all release tracks. Sourced by
# scripts/generate-release-notes.py via load_config() for every track.
#
# This is the single source of truth for the categorization buckets.
# Per-track files (.github/release-<track>.yaml) declare include_paths
# and the initial_release stub, but inherit categories from here.
#
# The type list mirrors CONTRIBUTING.md "Commit messages — Conventional
# Commits" and .github/workflows/semantic-pr.yaml `types:` list.
#
# To add a new Conventional-Commit type:
#   1. Add it to .github/workflows/semantic-pr.yaml `types:` list.
#   2. (Optional) Add it to a category here. The "Other" catch-all
#      will absorb new types if you skip this step.
# Unit test `test_categories_cover_all_semantic_pr_types` in
# scripts/generate-release-notes.py asserts the catch-all keeps the
# invariant satisfied if "Other" is ever removed.

categories:
  - title: "🚀 Features"
    types: [feat]
  - title: "🐛 Bug Fixes"
    types: [fix]
  - title: "⚡ Performance"
    types: [perf]
  - title: "♻️ Refactors"
    types: [refactor]
  - title: "📚 Documentation"
    types: [docs]
  - title: "🔧 Build & CI"
    types: [build, ci]
  - title: "🧪 Tests"
    types: [test]
  - title: "🧹 Chores"
    types: [chore, style, revert]
  - title: "Other"
    types: []
