# Bridge cancellation contract -----------------------------------------------------------------------------------------
#
# Fresh `CancellationToken::new()` inside `crates/bridge/src/` defeats
# the cooperative-cancellation propagation: a bridge cancel signal from
# the user's "Cancel" button travels from `ipc.rs::handle_start`'s root
# token down through every phase of `proxy_manager::start_inner` via
# `child_token()`. Any fresh token rooted elsewhere is unreachable from
# that root, and in-flight work observing only that fresh token cannot
# be preempted.
#
# Scope is workspace-wide (clippy.toml is workspace-rooted, no per-crate
# override in cargo today); ex-Galoshes crates that legitimately spawn
# their own root tokens carry a module-level `#![allow]`. The sanctioned
# bridge-side production sites are enumerated in the `reason =` string
# below; each carries a per-site `#[allow]` + comment citing this rule.
# See bindreams/hole#397.

[[disallowed-methods]]
path = "tokio_util::sync::CancellationToken::new"
reason = "In `crates/bridge/src/`, fresh tokens shadow the cooperative-cancellation chain rooted at `ipc.rs::handle_start`. Use the propagated `cancel: &CancellationToken` parameter (or `cancel.child_token()` for phase isolation). Sanctioned production sites: `ipc.rs::handle_start`, `dispatcher.rs::Dispatcher::new`, `proxy_manager.rs::ProxyManager::start`, `server_test.rs`. Test files use module-level `#![allow]`. See bindreams/hole#397."
