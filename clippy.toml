# Bridge trait-contract enforcement (bindreams/hole#165 mitigation) ----
#
# The `Proxy` and `Routing` traits are the only sanctioned entry points
# for spawning tunnels and mutating host routing tables. Direct calls to
# the underlying free functions / constructors bypass mock-based test
# isolation and caused the #165 incident (unit tests shelling out to
# real `netsh`, corrupting loopback state on Windows CI runners).
#
# Legitimate callers (the trait implementations themselves and the
# crash-recovery path) suppress the lint with a per-site
# `#[allow(clippy::disallowed_methods)]` plus a comment.

[[disallowed-methods]]
path = "tun_engine::routing::setup_routes"
reason = "Route setup must go through `Routing::install`. Only `SystemRouting::install` in tun-engine may call this. See #165."

[[disallowed-methods]]
path = "tun_engine::routing::teardown_routes"
reason = "Route teardown must go through `Routing::Installed`'s Drop. Only `SystemRoutes::drop` in tun-engine and `recover_routes` may call this. See #165."

# Port allocation — enforce bind_ephemeral over raw free_port (#285, #300) -
#
# Direct callers of `port_alloc::free_port` skip the
# divorced-port-number TOCTOU absorption that
# `port_alloc::bind_ephemeral` provides by folding the caller's bind
# into the same retry loop. On Windows the OS maintains independent
# TCP/UDP excluded-port-range tables (Hyper-V / WSL / Docker dynamic
# reservations); a port that passes a TCP probe can still fail UDP
# bind with WSAEACCES. Three production sites (LocalDnsServer::bind,
# start_plugin_chain, test_support::ssserver::start_real_ss_server*)
# go through `bind_ephemeral`; new sites must too.
#
# The one sanctioned suppression is
# `test_support::port_alloc::allocate_ephemeral_port` — it returns the
# port to the caller for external configuration (JSON config to a
# subprocess), which the closure shape of `bind_ephemeral` cannot
# accommodate. Suppress with `#[allow(clippy::disallowed_methods)]`
# plus a comment citing why the wrapper shape doesn't fit.

[[disallowed-methods]]
path = "hole_common::port_alloc::free_port"
reason = "Use `port_alloc::bind_ephemeral` instead — it folds the caller's bind into the same unbounded retry loop, eliminating the divorced-port-number TOCTOU window. Suppress with `#[allow(clippy::disallowed_methods)]` + comment when the port must be returned to the caller before the bind happens (e.g. `test_support::port_alloc::allocate_ephemeral_port`). See bindreams/hole#285 and #300."

# tracing subscriber test invariant (bindreams/hole#302) ---------------------------------------------------------------
#
# `tracing::subscriber::set_default` returns a thread-local guard. On a
# multi-thread tokio runtime, `tokio::spawn`'d tasks run on workers
# without the subscriber and their events are dropped. Tests that
# install a per-test subscriber as their assertion target must route
# through `garter::tracing_test::set_default_in_current_thread`, which
# checks the runtime flavor at install time and panics on multi-thread.
#
# Sanctioned suppressions: the helper itself uses an inline
# `#[allow(clippy::disallowed_methods)]` to call the real function;
# `garter::tracing_test_tests::raw_set_default_on_multi_thread_loses_spawned_events`
# uses it to deliberately demonstrate the bug the helper protects against.
# `crates/test-observability/src/lib_tests.rs` also uses an inline
# `#[allow]` for its own sync tests that exercise the global-default
# dispatch — no tokio runtime is present so the helper's check is
# vacuous, and the test-observability crate already sits beneath garter
# in the workspace dep graph (cycle avoidance).

[[disallowed-methods]]
path = "tracing::subscriber::set_default"
reason = "Use `garter::tracing_test::set_default_in_current_thread` — it asserts the current tokio runtime is current-thread, where `set_default`'s thread-local guard remains effective for `tokio::spawn`'d tasks. See bindreams/hole#302."

[[disallowed-methods]]
path = "tracing_subscriber::util::SubscriberInitExt::set_default"
reason = "Use `garter::tracing_test::set_default_in_current_thread` — it asserts the current tokio runtime is current-thread, where `set_default`'s thread-local guard remains effective for `tokio::spawn`'d tasks. See bindreams/hole#302."

[[disallowed-methods]]
path = "tracing::dispatcher::set_default"
reason = "Use `garter::tracing_test::set_default_in_current_thread` — `tracing::subscriber::set_default` delegates to this lower-level function; disallowing the underlying form keeps the same thread-local-guard footgun out of reach for code that reaches under the abstraction. See bindreams/hole#302."

