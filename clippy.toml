path = "hyper::client::conn::http1::SendRequest::send_request"
reason = "Must call sender.ready().await before send_request() (tower::Service contract). Use a wrapper type that enforces this."

# Bridge trait-contract enforcement ------------------------------------------------------------------------------------
#
# The `Proxy` and `Routing` traits are the only sanctioned entry points
# for spawning tunnels and mutating host routing tables. Direct calls to
# the underlying free functions / constructors bypass mock-based test
# isolation (unit tests would shell out to real `netsh`, corrupting
# loopback state on Windows CI runners тАФ see #165). Legitimate callers
# suppress the lint with a per-site `#[allow]` + comment.

[[disallowed-methods]]
path = "tun_engine::routing::setup_routes"
reason = "Route setup must go through `Routing::install`. Only `SystemRouting::install` in tun-engine may call this. See #165."

[[disallowed-methods]]
path = "tun_engine::routing::teardown_routes"
reason = "Route teardown must go through `Routing::Installed`'s Drop. Only `SystemRoutes::drop` in tun-engine and `recover_routes` may call this. See #165."

# Port allocation тАФ enforce bind_ephemeral over raw free_port ----------------------------------------------------------
#
# Direct callers of `port_alloc::free_port` skip the divorced-port-number
# TOCTOU absorption that `port_alloc::bind_ephemeral` provides by folding
# the caller's bind into the same retry loop. On Windows the OS maintains
# independent TCP/UDP excluded-port-range tables (Hyper-V / WSL / Docker
# dynamic reservations); a port that passes a TCP probe can still fail
# UDP bind with WSAEACCES. New sites must go through `bind_ephemeral`.
# See bindreams/hole#285 and #300.

[[disallowed-methods]]
path = "util::port_alloc::free_port"
reason = "Use `port_alloc::bind_ephemeral` instead тАФ it folds the caller's bind into the same unbounded retry loop, eliminating the divorced-port-number TOCTOU window. Suppress with `#[allow(clippy::disallowed_methods)]` + comment when the port must be returned to the caller before the bind happens (e.g. `test_support::port_alloc::allocate_ephemeral_port`). See bindreams/hole#285 and #300."

# tracing subscriber test invariant ------------------------------------------------------------------------------------
#
# `tracing::subscriber::set_default` returns a thread-local guard. On a
# multi-thread tokio runtime, `tokio::spawn`'d tasks run on workers
# without the subscriber and their events are dropped. Tests that
# install a per-test subscriber as their assertion target must route
# through `garter::tracing_test::set_default_in_current_thread`, which
# checks the runtime flavor at install time and panics on multi-thread.
# Sanctioned suppressions carry an inline `#[allow]`. See bindreams/hole#302.

[[disallowed-methods]]
path = "tracing::subscriber::set_default"
reason = "Use `garter::tracing_test::set_default_in_current_thread` тАФ it asserts the current tokio runtime is current-thread, where `set_default`'s thread-local guard remains effective for `tokio::spawn`'d tasks. See bindreams/hole#302."

[[disallowed-methods]]
path = "tracing_subscriber::util::SubscriberInitExt::set_default"
reason = "Use `garter::tracing_test::set_default_in_current_thread` тАФ it asserts the current tokio runtime is current-thread, where `set_default`'s thread-local guard remains effective for `tokio::spawn`'d tasks. See bindreams/hole#302."

[[disallowed-methods]]
path = "tracing::dispatcher::set_default"
reason = "Use `garter::tracing_test::set_default_in_current_thread` тАФ `tracing::subscriber::set_default` delegates to this lower-level function; disallowing the underlying form keeps the same thread-local-guard footgun out of reach for code that reaches under the abstraction. See bindreams/hole#302."

# Test-time subscriber install тАФ only hole-test-observability and the
# production logging::init_multi / binary-main sites may install global
# tracing subscribers via the `try_init` family. Direct callers in tests
# trigger the #147 LogTracer perf regression that times out
# `server_test_tests` on Windows CI. Sanctioned sites carry a per-site
# `#[allow]` with a citation. See bindreams/hole#301.

[[disallowed-methods]]
path = "tracing_subscriber::util::SubscriberInitExt::init"
reason = "Use hole_test_observability::register!() at lib.rs level for tests. Direct .init() calls trigger the #147 LogTracer perf trap (sets log::max_level=Trace and allocates a tracing Event for every log::*! from shadowsocks-service/tokio/mio). See bindreams/hole#301."

[[disallowed-methods]]
path = "tracing_subscriber::util::SubscriberInitExt::try_init"
reason = "Use hole_test_observability::register!() at lib.rs level for tests; the production caller in crates/common/src/logging.rs is sanctioned via #[allow]. See bindreams/hole#301."

# `fmt::SubscriberBuilder::{init,try_init}` are the `tracing_subscriber::fmt().init()`
# entry points; they forward to `SubscriberInitExt::try_init` internally, so the
# rules above do NOT catch them тАФ clippy `disallowed_methods` matches the literal
# called path, not the transitive forwarder. Ban explicitly. The two production
# callers in `crates/galoshes/src/main.rs` and `crates/garter-bin/src/main.rs`
# carry per-site `#[allow]` suppressions citing this rule.

[[disallowed-methods]]
path = "tracing_subscriber::fmt::SubscriberBuilder::init"
reason = "Use hole_test_observability::register!() at lib.rs level for tests. Production main.rs callers in galoshes/garter-bin are sanctioned via #[allow]. See bindreams/hole#301."

[[disallowed-methods]]
path = "tracing_subscriber::fmt::SubscriberBuilder::try_init"
reason = "Use hole_test_observability::register!() at lib.rs level for tests. See bindreams/hole#301."

