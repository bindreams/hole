[[disallowed-methods]]
path = "hyper::client::conn::http1::SendRequest::send_request"
reason = "Must call sender.ready().await before send_request() (tower::Service contract). Use a wrapper type that enforces this."

# Bridge trait-contract enforcement (bindreams/hole#165 mitigation) ----
#
# The `Proxy` and `Routing` traits are the only sanctioned entry points
# for spawning tunnels and mutating host routing tables. Direct calls to
# the underlying free functions / constructors bypass mock-based test
# isolation and caused the #165 incident (unit tests shelling out to
# real `netsh`, corrupting loopback state on Windows CI runners).
#
# Legitimate callers (the trait implementations themselves and the
# crash-recovery path) suppress the lint with a per-site
# `#[allow(clippy::disallowed_methods)]` plus a comment.

[[disallowed-methods]]
path = "crate::routing::setup_routes"
reason = "Route setup must go through `Routing::install`. Only `SystemRouting::install` in routing.rs may call this. See #165."

[[disallowed-methods]]
path = "crate::routing::teardown_routes"
reason = "Route teardown must go through `Routing::Installed`'s Drop. Only `SystemRoutes::drop` in routing.rs and `recover_routes` may call this. See #165."

# Spawn-time file-contention diagnostics (bindreams/hole#208) ----
#
# `crate::diagnostics::spawn::spawn_with_diagnostics` is the sanctioned
# wrapper around `Command::spawn`: on file-contention errors
# (`ERROR_ACCESS_DENIED` / `ERROR_SHARING_VIOLATION` on Windows,
# `ETXTBSY` / `EBUSY` on Unix) it logs every process holding the target
# file before propagating the error. Direct `.spawn()` calls bypass
# that and make CI flakes unactionable.
#
# Scope: this lint covers `Command::spawn` only. `Command::status()`
# and `Command::output()` also spawn internally but aren't covered
# because none of our current call sites invoke them on the hole
# binary (msiexec.status() targets msiexec, not hole). If that
# changes, wrap those sites too.
#
# Test fixtures that spawn throwaway helpers where the diagnostic isn't
# meaningful (e.g. a child just holding a file, or a `timeout`/`sleep`
# PID target) suppress with a per-site `#[allow(clippy::disallowed_methods)]`
# plus a comment.

[[disallowed-methods]]
path = "std::process::Command::spawn"
reason = "Use `crate::diagnostics::spawn::spawn_with_diagnostics` so ACCESS_DENIED / ETXTBSY surfaces file-holder info in the log. See #208."
