default_install_hook_types: [pre-commit, commit-msg]
exclude: '^external/'

repos:
  - repo: local
    hooks:
      - id: no-std-test
        name: "no stray #[test] attribute"
        entry: '^\s*#\[test\]'
        language: pygrep
        types: [rust]

      - id: cargo-fmt
        name: cargo fmt
        entry: cargo fmt
        language: system
        types: [rust]
        pass_filenames: false

      - id: cargo-clippy
        name: cargo clippy
        entry: cargo clippy --all-targets -- -D warnings
        language: system
        types: [rust]
        pass_filenames: false

      - id: check-version
        name: check Cargo.toml version vs git tag
        entry: python scripts/check-version.py
        language: system
        pass_filenames: false
        always_run: true

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-executables-have-shebangs
      - id: check-shebang-scripts-are-executable
      - id: mixed-line-ending
        args: ['--fix=lf']

  - repo: https://github.com/editorconfig-checker/editorconfig-checker.python
    rev: 3.2.1
    hooks:
      - id: editorconfig-checker
        exclude_types: [rust, markdown]
