[environment]
# Scripts target both Windows and POSIX — `scripts/dev.py` and
# `scripts/network-reset.py` call POSIX-only APIs (os.geteuid,
# os.getgrouplist, pwd.getpwnam) inside platform guards. Telling ty to
# assume all platforms makes those attributes resolve instead of failing
# with unresolved-attribute on the Windows CI runner.
python-platform = "all"

[rules]
# PEP 723 inline script dependencies are not visible to ty's module resolver.
unresolved-import = "ignore"

# xml.etree type stubs are incomplete; these are false positives.
[[overrides]]
include = ["msi-installer/tests/**"]

[overrides.rules]
invalid-return-type = "ignore"
unresolved-attribute = "ignore"
