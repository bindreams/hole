# Hole build manifest — single source of truth for `cargo xtask build|run|list`.
#
# Schema and semantics live in xtask/src/manifest.rs (deserializers, validation)
# and xtask/src/orchestrate.rs (DAG, execution). User-facing summary in CLAUDE.md
# under "Build".
#
# Platform shape: `<os>/<arch>` (Docker / GOOS-style), where
#   os   ∈ {windows, darwin, linux}
#   arch ∈ {amd64, arm64}
# (matching the project's release-artifact naming convention).
#
# Steps default to bash. Bare strings are shorthand for `bash: <string>`. Use
# `process: [...]` for direct subprocess spawn (no shell). Per-step
# `environment:` appends to inherited env. CWD is repo root.
#
# Two phases per target:
#   build:  produce the artifact this target is named after. May depend on
#           other targets' builds (`depends:` chains them).
#   run:    perform the work this target is named after — execute the test
#           binary, run the linter, launch dev mode. Optional; missing run:
#           means the target is a pure artifact. `cargo xtask run X` always
#           invokes the build cascade for X first; runs do NOT depend on
#           other runs.
#
# `*-tests` targets keep their `--no-run` build for compile-only validation,
# and their `run:` carries the canonical local nextest invocation. CI may
# still hand-roll its own nextest call (e.g. archive-based paths in
# test-garter / test-galoshes, or SKULD_LABELS gating in test-hole) where CI
# policy diverges from the canonical local invocation.

targets:
  # ex-ray: first-party v2ray-core SIP003 shim. Built from `crates/ex-ray/`
  # into `.cache/ex-ray/`; galoshes embeds it at compile time.
  ex-ray:
    platforms:
      matrix: { os: [windows, linux, darwin], arch: [amd64, arm64] }
    build: cargo xtask ex-ray

  galoshes:
    depends: ex-ray
    platforms:
      matrix: { os: [windows, linux, darwin], arch: [amd64, arm64] }
    build: cargo xtask galoshes

  garter:
    platforms:
      matrix: { os: [windows, linux, darwin], arch: [amd64, arm64] }
    build: cargo build --release -p garter

  garter-bin:
    depends: garter
    platforms:
      matrix: { os: [windows, linux, darwin], arch: [amd64, arm64] }
    build: cargo build --release -p garter-bin

  wintun:
    # Restricted to windows/amd64 because xtask::wintun unconditionally
    # extracts the amd64 DLL from the upstream zip — windows/arm64 would
    # silently install the wrong-arch DLL. Lift this once xtask::wintun
    # picks per-host-arch.
    platforms: [windows/amd64]
    build: cargo xtask wintun

  hole:
    # Builds the hole executable + sidecars in debug profile and stages the
    # canonical BINDIR. Release builds happen inside `hole-msi` / `hole-dmg`
    # via msi-installer / tauri, which run their own `cargo build --release`
    # — so `hole` itself is what you build for development and tests.
    #
    # `cargo xtask run hole` launches dev mode via the dev-console crate.
    # dev-console runs `cargo xtask build hole` internally so `cargo run -p
    # dev-console` also works standalone; after this target's build cascade
    # that inner build is an incremental no-op. dev-console runs unprivileged
    # and elevates only the bridge — via sudo on POSIX (prompts for your
    # password), inheriting the elevated token on Windows (#452, #454).
    #
    # `--no-default-features` keeps Tauri's `cfg(dev) = true` so the webview
    # loads from the Vite dev server (`http://localhost:1420`) instead of
    # demanding pre-built embedded assets at `ui/dist/`. The hole crate's
    # default = ["tauri/custom-protocol"] is meant for production builds
    # (hole-msi / hole-dmg) — see the frontend-build note.
    depends: [galoshes, wintun]
    platforms: [windows/amd64, darwin/amd64, darwin/arm64]
    build:
      - cargo build --workspace --no-default-features --features tombstone/crash-dumps
      - cargo xtask stage --profile debug --out-dir target/debug/dist
    run: cargo run --package dev-console --quiet

  hole-msi:
    # NOT a dependent of `hole`. The msi-installer Python entry point does its
    # own `cargo build --release` + `cargo xtask stage --profile release`, so
    # depending on `hole` (debug) would force a redundant debug compile that
    # nothing consumes. We depend instead on the same sidecars `hole` does, so
    # the MSI build still has ex-ray, galoshes, and wintun.dll on disk.
    #
    # `frontend-build` is on the depends list so `ui/dist/` exists before the
    # Rust build — see the frontend-build note.
    depends: [galoshes, wintun, frontend-build]
    platforms: [windows/amd64]
    build: uv run --directory msi-installer build

  hole-dmg:
    # Same logic as hole-msi: tauri does its own `cargo build --release`. No
    # wintun dep on darwin (it doesn't apply to that platform).
    #
    # `frontend-build` is a dep so `node_modules/` (with `@tauri-apps/cli`)
    # exists before `npx tauri build` runs — see the frontend-build note.
    depends: [galoshes, frontend-build]
    platforms: [darwin/amd64, darwin/arm64]
    # `-v` surfaces the hdiutil stderr tauri-bundler otherwise swallows (#446).
    build: npx tauri build -v

  hole-dmg-tests:
    # Pytest harness that asserts the produced .app's code signature is
    # internally consistent (sealed resources, no linker-signed-only Mach-Os,
    # sidecar identifier rewritten). Guards against issue #364 regressing.
    depends: hole-dmg
    platforms: [darwin/amd64, darwin/arm64]
    run: uv run --directory dmg-installer pytest -v

  frontend-build:
    # Vite bundle of ui/ → ui/dist/. Pure JS/TS toolchain, platform-
    # independent output. The type-check (`cargo xtask run frontend-check`)
    # is a separate target — tsc reads source directly and produces no
    # artifact.
    #
    # Listed on `hole-msi.depends` AND `hole-dmg.depends`. For `hole-msi`:
    # msi-installer's `cargo build --release` does NOT honor Tauri's
    # `beforeBuildCommand` (only `npx tauri build` does), so the frontend
    # has to be built ahead of the Rust build. For `hole-dmg`: `npx tauri
    # build` needs `node_modules/` populated (with `@tauri-apps/cli`)
    # before it can even start; the `npm ci` step here provides that.
    # Tauri's own `beforeBuildCommand: "npm run build"` re-runs vite —
    # ~10-15s waste — but we accept the redundancy to keep `npx tauri
    # build` self-sufficient for ad-hoc dev use outside the orchestrator.
    #
    # `hole-msi` doesn't switch to `npx tauri build` because the WiX MSI
    # layout (custom-action install/uninstall, PATH munging, embedded
    # cabinets) doesn't fit Tauri's bundler output shape.
    #
    # Platforms cover every host that builds hole: linux/amd64 keeps the
    # Renovate `frontend-check` standalone path working, windows/amd64
    # satisfies `hole-msi`, darwin/{amd64,arm64} satisfies `hole-dmg`.
    platforms: [linux/amd64, windows/amd64, darwin/amd64, darwin/arm64]
    build:
      - npm ci --no-audit --no-fund
      - npm run build

  # ===== Test targets =======================================================
  # `build:` compiles test binaries (--no-run); `run:` is the canonical local
  # nextest invocation. CI may diverge from it (see the header note above).

  hole-tests:
    # `--no-default-features` matches the `hole` target's debug build: tests
    # compile main.rs (which expands `tauri::generate_context!()`), and
    # production-mode generate_context panics at compile time on missing
    # `ui/dist/`. Tests don't need bundled frontend assets — they exercise
    # CLI / IPC / bridge paths, not the webview (see the frontend-build note).
    depends: hole
    platforms: [windows/amd64, darwin/amd64, darwin/arm64]
    build: >
      cargo nextest run --no-run --no-default-features --features tombstone/crash-dumps,tombstone/crash-child
      -E 'package(hole) + package(hole-bridge) + package(hole-common)
          + package(tun-engine) + package(tun-engine-macros)
          + package(dump) + package(dump-macros)
          + package(handle-holders) + package(tombstone)
          + package(hole-test-observability)'
    run: >
      cargo nextest run --no-default-features --features tombstone/crash-dumps,tombstone/crash-child
      -E 'package(hole) + package(hole-bridge) + package(hole-common)
          + package(tun-engine) + package(tun-engine-macros)
          + package(dump) + package(dump-macros)
          + package(handle-holders) + package(tombstone)
          + package(hole-test-observability)'

  plugin-e2e-tests:
    # Plugin interop/e2e area (crate `plugin-e2e`, #435): ex-ray↔stock interop
    # (all 6 platforms; QUIC `not(windows)`) + galoshes server↔client roundtrips
    # (Linux-only, #197). These spawn plugin BINARIES, so they need on-disk
    # artifacts: ex-ray + galoshes (via `cargo xtask deps` and the
    # `depends: galoshes` chain) and the pinned stock v2ray-plugin (provisioned
    # in `build:` below). Deliberately NOT on the archive lane — that lane ships
    # no on-disk binaries — so this target gets its own `test-plugin-e2e` CI job.
    #
    # `depends: galoshes` chains ex-ray → galoshes, so both are on disk before
    # these build steps run; only the stock upstream binary needs a dedicated
    # provisioning step (a near-instant no-network cache hit on re-run). So
    # `cargo xtask run plugin-e2e-tests` provisions-then-tests in one command
    # locally, and CI's `test-plugin-e2e` job calls the same.
    depends: galoshes
    platforms:
      matrix: { os: [windows, linux, darwin], arch: [amd64, arm64] }
    build:
      - cargo xtask provision-upstream-v2ray
      - cargo nextest run --no-run -p plugin-e2e
    run: cargo nextest run -p plugin-e2e

  galoshes-tests:
    depends: galoshes
    platforms:
      matrix: { os: [windows, linux, darwin], arch: [amd64, arm64] }
    build: cargo nextest run --no-run -p galoshes
    run: cargo nextest run -p galoshes

  garter-tests:
    depends: garter
    platforms:
      matrix: { os: [windows, linux, darwin], arch: [amd64, arm64] }
    # `--features test-utils` makes `garter::test_utils::WaitableWriter`
    # visible to the integration tests (`tests/*.rs`). See garter's
    # Cargo.toml `[features]` and bindreams/hole#383.
    build: cargo nextest run --no-run -p garter --features test-utils
    run: cargo nextest run -p garter --features test-utils

  garter-bin-tests:
    depends: garter-bin
    platforms:
      matrix: { os: [windows, linux, darwin], arch: [amd64, arm64] }
    build: cargo nextest run --no-run -p garter-bin
    run: cargo nextest run -p garter-bin

  kill-group-tests:
    platforms:
      matrix: { os: [windows, linux, darwin], arch: [amd64, arm64] }
    build: cargo nextest run --no-run -p kill-group
    run: cargo nextest run -p kill-group

  stepstool-tests:
    platforms:
      matrix: { os: [windows, linux, darwin], arch: [amd64, arm64] }
    build: cargo nextest run --no-run -p stepstool
    run: cargo nextest run -p stepstool

  dev-console-tests:
    platforms:
      matrix: { os: [windows, linux, darwin], arch: [amd64, arm64] }
    build: cargo nextest run --no-run -p dev-console
    run: cargo nextest run -p dev-console

  util-tests:
    platforms:
      matrix: { os: [windows, linux, darwin], arch: [amd64, arm64] }
    build: cargo nextest run --no-run -p util
    run: cargo nextest run -p util

  # ===== Lint & check targets ==============================================
  # No build phase; the tool's incremental cache is the build. Each is a
  # first-class runnable invoked via `cargo xtask run <name>`, replacing the
  # CI yaml's hand-rolled invocations.

  clippy-hole:
    # Hole platforms only. On the Hole platforms the entire workspace
    # compiles, so `--workspace` is correct.
    #
    # `--no-default-features` matches the `hole` / `hole-tests` targets:
    # clippy expands `tauri::generate_context!()` like a regular compile,
    # which would panic on missing `ui/dist/` in production mode. Linting
    # the dev-mode codepaths is sufficient — the cfg(dev) gate only affects
    # Tauri-internal URL resolution, not Hole-side code. See #372.
    platforms: [windows/amd64, darwin/amd64, darwin/arm64]
    run: cargo clippy --workspace --all-targets --no-default-features --features garter/test-utils -- -D warnings

  clippy-ex-galoshes:
    # Hole crates use windows/macos cfg-gates that don't compile on linux or
    # windows/arm64; on those platforms scope clippy to the ex-Galoshes
    # crates only via -p filters. The two clippy- targets together cover the
    # full 6-platform CI matrix without overlap.
    platforms: [linux/amd64, linux/arm64, windows/arm64]
    run: cargo clippy -p garter -p garter-bin -p galoshes -p plugin-e2e -p util -p kill-group -p stepstool -p dev-console --all-targets --features garter/test-utils -- -D warnings

  prek:
    # cargo-fmt + repo-wide hooks. SKIP=cargo-clippy because clippy lives in
    # the per-platform clippy-* targets above. Platforms wide-open so devs on
    # any host can `cargo xtask run prek` locally; CI's lint job pins its own
    # runner, the target's platform list doesn't dictate where CI runs it.
    platforms:
      matrix: { os: [windows, linux, darwin], arch: [amd64, arm64] }
    run:
      - bash:
          command: prek run --all-files --show-diff-on-failure
          environment: { SKIP: cargo-clippy }

  frontend-check:
    # tsc --noEmit + Vitest unit tests. Platform-independent (tsc and
    # Vitest both read source files directly; no Vite bundle dependency).
    # No `depends: frontend-build` — tsc reads source files directly; the
    # Vite bundle is an artifact, not an input to the type-check.
    platforms:
      matrix: { os: [windows, linux, darwin], arch: [amd64, arm64] }
    run:
      - npm ci --no-audit --no-fund
      - npm run check
      - npm test
