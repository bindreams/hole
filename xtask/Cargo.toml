[package]
name = "xtask"
version = "0.1.0"
edition = "2021"
publish = false

[lints]
workspace = true

[lib]
name = "xtask"
path = "src/lib.rs"
harness = false

[[bin]]
name = "xtask"
path = "src/main.rs"

[dependencies]
anyhow = "1"
cargo_metadata = "0.19"
clap = { version = "4", features = ["derive"] }
glob = "0.3"
xtask-lib = { path = "../xtask-lib" }

# `cargo xtask wintun` (Windows-only at runtime, but the deps are unconditional
# so the workspace `cargo check` is identical across platforms — easier to keep
# everyone on the same lockfile).
sha2 = "0.11"
ureq = "3"
zip = { version = "8", default-features = false, features = ["deflate"] }

[dev-dependencies]
skuld = { workspace = true }
tempfile = "3"
