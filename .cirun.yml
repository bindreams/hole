# Cirun.io self-hosted GitHub Actions runners.
#
# Provisioned for #200 investigation: GHA `windows-latest` (Azure Hyper-V
# Server 2025) flakes on TCP loopback. We need to test on a different
# hypervisor to isolate whether the bug is Hyper-V-layer or
# Windows-Server-2025-layer. AWS EC2 uses Nitro (KVM-based), not
# Hyper-V — so a successful run here strongly implicates Hyper-V.
runners:
  - name: hole-windows-amd64
    cloud: aws
    region: us-east-1
    # m5.2xlarge: 8 vCPU / 32 GB. Matches GHA windows-latest spec
    # (Standard_DS4_v2 = 8 vCPU / 28 GB) closely enough that runtime
    # comparisons are meaningful.
    instance_type: m5.2xlarge
    # Windows Server 2025 English Full Base, AWS-managed AMI.
    # NB: Microsoft re-releases this weekly with security updates;
    # the AMI ID below was current as of late April 2026 in us-east-1.
    # If the runner provisioning fails with "InvalidAMIID.NotFound",
    # update via:
    #   aws ec2 describe-images --owners amazon --region us-east-1 \
    #     --filters 'Name=name,Values=Windows_Server-2025-English-Full-Base-*' \
    #     --query 'Images | sort_by(@, &CreationDate)[-1].ImageId' --output text
    machine_image: ami-02e3d076cbd5c28fa
    preemptible: false
    labels:
      - cirun-windows-2025-amd64
