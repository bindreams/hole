exclude = "^external/"
default_install_hook_types = ["pre-commit", "commit-msg"]

# Local hooks ==========================================================================================================

[[repos]]
repo = "local"

[[repos.hooks]]
id = "no-std-test"
name = "no stray #[test] attribute"
entry = '^\s*#\[test\]'
language = "pygrep"
types = ["rust"]

[[repos.hooks]]
id = "cargo-fmt"
name = "cargo fmt"
entry = "cargo fmt"
language = "system"
types = ["rust"]
pass_filenames = false

[[repos.hooks]]
id = "cargo-clippy"
name = "cargo clippy"
entry = "cargo clippy --all-targets -- -D warnings"
language = "system"
types = ["rust"]
pass_filenames = false

[[repos.hooks]]
id = "check-version"
name = "check Cargo.toml version vs git tag"
entry = "cargo xtask version --check"
language = "system"
pass_filenames = false
always_run = true

[[repos.hooks]]
id = "check-workspace-lints"
name = "check workspace lints inheritance"
entry = "python scripts/check-workspace-lints.py"
language = "python"
pass_filenames = false
always_run = true

[[repos.hooks]]
id = "format-section-comments"
name = "format section comments"
entry = "python scripts/format-section-comments.py"
language = "python"
types_or = ["rust", "python", "toml", "javascript", "ts", "jsx", "tsx"]

[[repos.hooks]]
id = "ty"
name = "ty check"
entry = "ty check"
language = "python"
types = ["python"]
pass_filenames = false
additional_dependencies = ["ty"]

# External hooks =======================================================================================================

[[repos]]
repo = "https://github.com/pre-commit/pre-commit-hooks"
rev = "v5.0.0"
hooks = [
  { id = "check-executables-have-shebangs" },
  { id = "check-shebang-scripts-are-executable" },
  { id = "mixed-line-ending", args = ["--fix=lf"] },
]

[[repos]]
repo = "https://github.com/editorconfig-checker/editorconfig-checker.python"
rev = "3.2.1"
hooks = [
  { id = "editorconfig-checker", exclude_types = ["rust", "markdown", "python"] },
]

[[repos]]
repo = "https://github.com/google/yapf"
rev = "v0.43.0"
hooks = [
  { id = "yapf" },
]

[[repos]]
repo = "https://github.com/hukkin/mdformat"
rev = "1.0.0"
hooks = [
  { id = "mdformat", additional_dependencies = ["mdformat-gfm"] },
]

[[repos]]
repo = "https://github.com/biomejs/pre-commit"
rev = "v2.4.10"
hooks = [
  { id = "biome-check", additional_dependencies = ["@biomejs/biome@2.1.1"] },
]
