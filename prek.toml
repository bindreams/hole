default_install_hook_types = ["pre-commit", "commit-msg"]

# Vendored upstream code is kept pristine; no hook may lint, format, or rewrite
# it. crates/ex-ray/third_party/{v2ray-core,utls} are git-subrepos of pristine
# upstream (build truth via go.mod replace); see their third_party/VENDORING.md.
exclude = '^crates/ex-ray/third_party/(v2ray-core|utls)/'

# Local hooks ==========================================================================================================

[[repos]]
repo = "local"

[[repos.hooks]]
id = "no-std-test"
name = "no stray #[test] attribute"
entry = '^\s*#\[test\]'
language = "pygrep"
types = ["rust"]

[[repos.hooks]]
id = "no-cargo-in-tests"
name = "no runtime cargo invocations in test code"
# Test code must locate prebuilt fixture binaries (CARGO_BIN_EXE_* /
# xtask-derived locators), never build them: a concurrent `cargo build`'s
# uplift deletes+recreates `target/<profile>/<bin>` (always, on macOS),
# racing sibling tests' spawns. See bindreams/hole#496.
entry = 'Command::new\("cargo"\)'
language = "pygrep"
types = ["rust"]
files = '(^|/)tests/|/test_support/|_tests\.rs$'

[[repos.hooks]]
id = "cargo-fmt"
name = "cargo fmt"
entry = "cargo fmt"
language = "system"
types = ["rust"]
pass_filenames = false

[[repos.hooks]]
id = "cargo-clippy"
name = "cargo clippy"
# `--no-default-features` is required to keep Tauri in dev mode for the
# `hole` crate -- production mode panics at compile time on missing
# `ui/dist/` because `tauri/custom-protocol` triggers `tauri-codegen`'s
# embed step. Production lint coverage runs under `clippy-hole` in CI
# (which uses the same flag). See bindreams/hole#372.
# `--features garter/test-utils`: garter's fixture bin + feature-gated
# tests are otherwise silently excluded from `--all-targets`.
entry = "cargo clippy --all-targets --no-default-features --features garter/test-utils -- -D warnings"
language = "system"
types = ["rust"]
pass_filenames = false

[[repos.hooks]]
id = "go-fmt"
name = "golangci-lint fmt (ex-ray)"
# prek (0.3.6) has no per-hook working-directory field, so this `cd`s into the
# Go module via a bash wrapper. golangci-lint is provisioned by
# `cargo xtask deps` into .cache/ -- referenced by absolute path (resolved from
# the repo root via `git rev-parse`) so there's no PATH dependency and the hook
# behaves identically locally and in CI. `fmt --diff` is check-only (the v2
# formatters/gofumpt run). `crates/ex-ray` is the only Go module today; if a
# second appears, extend this hook (Task 12's grep catches strays).
entry = "bash -c 'cd crates/ex-ray && \"$(git rev-parse --show-toplevel)/.cache/golangci-lint/2.12.2/golangci-lint\" fmt --diff'"
language = "system"
# types=["go"] means the hook is SKIPPED when no .go file is staged (same as the
# Rust hooks). A `.golangci.yml`-only change still surfaces in CI's --all-files run.
types = ["go"]
pass_filenames = false

[[repos.hooks]]
id = "go-lint"
name = "golangci-lint run (ex-ray)"
# `run` = the v2 linters (incl. govet, which subsumes `go vet`). `fmt` and `run`
# are both needed -- golangci-lint v2 separates formatting from linting. Same
# bash-wrapper + absolute-cache-path rationale as `go-fmt` above.
entry = "bash -c 'cd crates/ex-ray && \"$(git rev-parse --show-toplevel)/.cache/golangci-lint/2.12.2/golangci-lint\" run'"
language = "system"
types = ["go"]
pass_filenames = false

[[repos.hooks]]
id = "check-version-hole"
name = "check hole group Cargo.toml version vs git tag"
entry = "cargo xtask version --check --group hole"
language = "system"
pass_filenames = false
files = "^(Cargo\\.toml|crates/(hole|common|bridge|tun-engine|tun-engine-macros|dump|dump-macros|handle-holders)/Cargo\\.toml)$"

[[repos.hooks]]
id = "check-version-garter"
name = "check garter group Cargo.toml version vs git tag"
entry = "cargo xtask version --check --group garter"
language = "system"
pass_filenames = false
files = "^(Cargo\\.toml|crates/(garter|garter-bin)/Cargo\\.toml)$"

[[repos.hooks]]
id = "check-version-galoshes"
name = "check galoshes group Cargo.toml version vs git tag"
entry = "cargo xtask version --check --group galoshes"
language = "system"
pass_filenames = false
files = "^(Cargo\\.toml|crates/galoshes/Cargo\\.toml)$"

[[repos.hooks]]
id = "check-version-kill-group"
name = "check kill-group group Cargo.toml version vs git tag"
entry = "cargo xtask version --check --group kill-group"
language = "system"
pass_filenames = false
files = "^(Cargo\\.toml|crates/kill-group/Cargo\\.toml)$"

[[repos.hooks]]
id = "check-version-ex-ray"
name = "check ex-ray version vs git tag"
entry = "cargo xtask version --check --group ex-ray"
language = "system"
pass_filenames = false
files = "^crates/ex-ray/version\\.toml$"

[[repos.hooks]]
id = "gen-ui-constants"
name = "ui/generated.ts up to date with Rust constants"
entry = "cargo xtask gen-ui-constants --check"
language = "system"
pass_filenames = false
files = "^(ui/generated\\.ts|crates/common/src/protocol\\.rs|xtask/src/gen_ui_constants\\.rs)$"

[[repos.hooks]]
id = "check-workspace-lints"
name = "check workspace lints inheritance"
entry = "python scripts/check-workspace-lints.py"
language = "python"
pass_filenames = false
always_run = true

[[repos.hooks]]
id = "format-section-comments"
name = "format section comments"
entry = "python scripts/format-section-comments.py"
language = "python"
types_or = ["rust", "python", "toml", "javascript", "ts", "jsx", "tsx", "dockerfile"]

[[repos.hooks]]
id = "ty"
name = "ty check"
entry = "ty check"
language = "python"
types = ["python"]
pass_filenames = false
additional_dependencies = ["ty"]

# External hooks =======================================================================================================

[[repos]]
repo = "https://github.com/pre-commit/pre-commit-hooks"
rev = "v5.0.0"
hooks = [
  { id = "check-executables-have-shebangs" },
  # Rust inner attributes start with `#![...]`, which the shebang detector
  # mistakes for `#!/...`. Exclude .rs from this hook (matches how galoshes
  # worked pre-merge).
  { id = "check-shebang-scripts-are-executable", exclude_types = ["rust"] },
  { id = "mixed-line-ending", args = ["--fix=lf"] },
]

[[repos]]
repo = "https://github.com/editorconfig-checker/editorconfig-checker.python"
rev = "3.2.1"
hooks = [
  { id = "editorconfig-checker", exclude_types = ["rust", "markdown", "python", "go"] },
]

[[repos]]
repo = "https://github.com/google/yapf"
rev = "v0.43.0"
hooks = [
  { id = "yapf" },
]

[[repos]]
repo = "https://github.com/hukkin/mdformat"
rev = "1.0.0"
hooks = [
  { id = "mdformat", additional_dependencies = ["mdformat-gfm"] },
]

[[repos]]
repo = "https://github.com/biomejs/pre-commit"
rev = "v2.4.10"
hooks = [
  # `ui/generated.ts` is machine-generated (gen-ui-constants) — exclude it so biome
  # never reformats it out of sync with the generator's output.
  { id = "biome-check", additional_dependencies = ["@biomejs/biome@2.1.1"], exclude = "^ui/generated\\.ts$" },
]
