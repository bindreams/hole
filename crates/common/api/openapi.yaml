openapi: "3.1.0"
info:
  title: Hole Bridge API
  description: REST API for controlling the Hole bridge over a local socket.
  version: "1.0.0"

paths:
  /v1/status:
    get:
      summary: Get proxy status
      operationId: getStatus
      responses:
        "200":
          description: Current proxy status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"

  /v1/version:
    get:
      summary: Get the bridge build version
      operationId: getVersion
      responses:
        "200":
          description: The bridge's build version string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VersionResponse"

  /v1/start:
    post:
      summary: Start the proxy
      operationId: startProxy
      parameters:
        - in: header
          name: X-Hole-Attempt-Id
          required: false
          schema:
            type: string
          description: >-
            Client-minted per-attempt idempotency key (a UUID). The bridge scopes
            start-cancellation to it so a stale pre-armed cancel can never silently
            cancel a later, unrelated attempt (#465). Absent/empty disables pre-arm
            scoping for that request (fail-safe: a start never consumes a pre-arm,
            a cancel never arms); the GUI/CLI always send a non-empty value.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProxyConfig"
      responses:
        "200":
          description: Proxy started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmptyResponse"
        "409":
          description: A start is already in flight (concurrent-start, control-plane rejection)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: The start failed; the body is the typed StartError
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartError"

  /v1/stop:
    post:
      summary: Stop the proxy
      operationId: stopProxy
      responses:
        "200":
          description: Proxy stopped
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmptyResponse"
        "500":
          description: Failed to stop proxy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/cancel:
    post:
      summary: Cancel an in-flight proxy start
      description: |
        Idempotent signal that interrupts the in-flight `POST /v1/start` whose
        `X-Hole-Attempt-Id` matches. If no matching start is in flight, the cancel
        is "pre-armed" and consumed by the next start carrying the SAME attempt id
        — a stale arm can never match a later, unrelated attempt's id (#465).
        Always returns 200 — the bridge records the intent regardless of whether
        there is anything to cancel right now. The cancelled start itself returns
        500 with `ErrorResponse { message: "cancelled" }`.
      operationId: cancelProxy
      parameters:
        - in: header
          name: X-Hole-Attempt-Id
          required: false
          schema:
            type: string
          description: >-
            The attempt id this cancel targets (see `POST /v1/start`). Matched
            against the in-flight start, or pre-armed for the start that will
            carry it.
      responses:
        "200":
          description: Cancel recorded (idempotent)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmptyResponse"

  /v1/lockdown:
    post:
      summary: Set the standing kill switch (lockdown mode) intent
      description: |
        Last-writer-wins absolute set of the bridge-owned, system-wide
        lockdown intent. Any authorized caller may toggle it freely. Returns
        200 with EmptyResponse on success.
      operationId: setLockdown
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LockdownRequest"
      responses:
        "200":
          description: Lockdown intent recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmptyResponse"
        "500":
          description: Failed to persist lockdown intent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/update-apply:
    post:
      summary: Apply a verified update (service-manager cutover)
      description: |
        The privileged bridge swaps its own binary by rename and restarts the
        bridge service. The request carries the already-downloaded+verified
        payload path; the bridge re-verifies before extracting. A lockdown-off
        update REQUIRES consent=true (informed-consent seam). Returns 200 once
        the cutover has been kicked off; the actual restart is asynchronous and
        every GUI self-heals onto the new image.
      operationId: applyUpdate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateApplyRequest"
      responses:
        "200":
          description: Cutover accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmptyResponse"
        "400":
          description: >-
            The install destination is invalid (macOS): the `.app` swap target is
            not a genuine `com.hole.app` bundle, or its volume cannot atomically
            swap. A destination precondition, distinct from a payload-bytes
            failure; refused before the marker write
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: A lockdown-off update was requested without consent=true
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: A cutover is already in progress (single-occupancy)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: >-
            Payload re-verification failed (signature/hash mismatch or asset not
            in the manifest) — a corruption/tamper event; the cutover marker is
            claimed then cleared, so no cutover proceeds
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: >-
            Cutover failed (private-dir resolution, payload staging I/O,
            marker-write, extract, actor spawn, or a blocking-task panic)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/reload:
    post:
      summary: Reload the proxy with new configuration
      operationId: reloadProxy
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProxyConfig"
      responses:
        "200":
          description: Proxy reloaded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmptyResponse"
        "500":
          description: Failed to reload proxy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/metrics:
    get:
      summary: Get connection metrics
      operationId: getMetrics
      responses:
        "200":
          description: Current traffic metrics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MetricsResponse"

  /v1/diagnostics:
    get:
      summary: Get diagnostic chain status
      operationId: getDiagnostics
      responses:
        "200":
          description: Health status of each component
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DiagnosticsResponse"

  /v1/test-server:
    post:
      summary: Run a one-shot shadowsocks client test against a server entry
      operationId: testServer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TestServerRequest"
      responses:
        "200":
          description: Test result (the test ran to completion; the outcome may itself be a failure variant)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TestServerResponse"
        "500":
          description: The test runner itself failed (not the test outcome)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    StatusResponse:
      type: object
      required:
        - running
        - uptime_secs
      properties:
        running:
          type: boolean
        uptime_secs:
          type: integer
          format: uint64
          minimum: 0
        error:
          type:
            - string
            - "null"
        invalid_filters:
          type: array
          items:
            $ref: "#/components/schemas/InvalidFilter"
          default: []
        udp_proxy_available:
          type: boolean
          default: true
        ipv6_bypass_available:
          type: boolean
          default: true
        lockdown_enabled:
          type: boolean
          default: false
          description: >-
            Whether the standing kill switch (lockdown mode) intent is on.
            Bridge-owned, system-wide. serde-default false so older clients that
            don't send it keep today's behavior.
        lockdown_active:
          type: boolean
          default: false
          description: >-
            Whether a lockdown cover is currently engaged. `lockdown_enabled &&
            !lockdown_active` is a tray warning state — never silent green.

    ErrorResponse:
      type: object
      required:
        - message
      properties:
        message:
          type: string

    StartError:
      type: object
      description: |
        Not code-generated; see protocol.rs::StartError. Tagged union with a `kind`
        discriminator: cancelled, already_running, network_blocked, failed {message}.
        Concurrent-start is surfaced client-side as ClientError::ConcurrentStart (a
        generic ErrorResponse on the 409).
      required:
        - kind
      properties:
        kind:
          type: string
        message:
          type: string

    VersionResponse:
      type: object
      required:
        - version
      properties:
        version:
          type: string

    EmptyResponse:
      type: object
      additionalProperties: false

    InvalidFilter:
      type: object
      required:
        - index
        - error
      properties:
        index:
          type: integer
          format: uint32
          minimum: 0
        error:
          type: string

    FilterMetrics:
      type: object
      required:
        - total_connections
        - proxied
        - bypassed
        - blocked
        - sniffer_hits
        - sniffer_misses
        - active_udp_flows
        - udp_drops_backpressure
      properties:
        total_connections:
          type: integer
          format: uint64
          minimum: 0
        proxied:
          type: integer
          format: uint64
          minimum: 0
        bypassed:
          type: integer
          format: uint64
          minimum: 0
        blocked:
          type: integer
          format: uint64
          minimum: 0
        sniffer_hits:
          type: integer
          format: uint64
          minimum: 0
        sniffer_misses:
          type: integer
          format: uint64
          minimum: 0
        active_udp_flows:
          type: integer
          format: uint32
          minimum: 0
        udp_drops_backpressure:
          type: integer
          format: uint64
          minimum: 0

    MetricsResponse:
      type: object
      required:
        - bytes_in
        - bytes_out
        - speed_in_bps
        - speed_out_bps
        - uptime_secs
      properties:
        bytes_in:
          type: integer
          format: uint64
          minimum: 0
          description: >-
            Cumulative bytes received through the tunnel since the proxy
            started — wire bytes on the proxied connection, including
            cipher overhead. Includes DNS-forwarder queries carried over
            the tunnel; bypass-routed traffic is not counted. Resets on
            every start. 0 when stopped.
        bytes_out:
          type: integer
          format: uint64
          minimum: 0
          description: >-
            Cumulative bytes sent through the tunnel since the proxy
            started. Same accounting rules as bytes_in.
        speed_in_bps:
          type: integer
          format: uint64
          minimum: 0
          description: >-
            Download speed in bits per second, averaged over the window
            since the previous /v1/metrics call. 0 on the first poll
            after a start and when stopped.
        speed_out_bps:
          type: integer
          format: uint64
          minimum: 0
          description: >-
            Upload speed in bits per second. Same windowing as
            speed_in_bps.
        uptime_secs:
          type: integer
          format: uint64
          minimum: 0
        filter:
          oneOf:
            - $ref: "#/components/schemas/FilterMetrics"
            - type: "null"

    DiagnosticsResponse:
      type: object
      required:
        - app
        - bridge
        - network
        - vpn_server
        - internet
      properties:
        app:
          type: string
          description: |
            Always "ok" inside this handler — being able to respond proves the
            GUI process is alive. The GUI overrides to "unknown" only when the
            IPC call to the bridge fails entirely.
        bridge:
          type: string
          description: |
            Always "ok" inside this handler — being able to respond proves the
            bridge IPC server is alive. Set to "unknown" by the GUI fallback
            path when the bridge is unreachable.
        network:
          type: string
          description: |
            "ok" if the host has a default gateway configured (a weak proxy
            for local network availability). "error" if no default gateway
            can be detected. Best-effort local check; does not actually
            probe the gateway.
        vpn_server:
          type: string
          description: |
            Bridge always returns "unknown". The GUI computes this dot from
            the selected ServerEntry's persisted validation state and
            ignores this field. Kept on the wire for backward compatibility.
        internet:
          type: string
          description: |
            Bridge always returns "unknown". The GUI computes this dot from
            the selected ServerEntry's persisted validation state and
            ignores this field.

    # Documentation-only schemas (not code-generated; hand-written in Rust)
    ProxyConfig:
      type: object
      description: |
        Hand-written in protocol.rs — included here for spec completeness.

        Listener rules: in `tunnel_mode == full`, disabling `proxy_socks5`
        requires `proxy_http` to be disabled too — that combination is a
        valid "pure-VPN" start where the bridge binds its internal SOCKS5
        data plane on an ephemeral loopback port and nothing listens on
        `local_port` / `local_port_http`. In `tunnel_mode == socks-only`,
        at least one of `proxy_socks5` / `proxy_http` must be true. If
        both listeners are enabled, `local_port` and `local_port_http`
        must differ. Any violation makes the bridge reject
        `BridgeRequest::Start` with `BridgeResponse::Error`.
      required:
        - server
        - local_port
      properties:
        server:
          $ref: "#/components/schemas/ServerEntry"
        local_port:
          type: integer
          format: uint16
          minimum: 0
        tunnel_mode:
          $ref: "#/components/schemas/TunnelMode"
          description: |
            Which parts of the network stack to install. Defaults to
            `full` when absent (backwards-compatible with older clients).
        proxy_socks5:
          type: boolean
          default: true
          description: |
            Whether to bind a user-facing SOCKS5 listener on
            127.0.0.1:{local_port}. In tunnel_mode == full, false is only
            valid together with proxy_http == false (pure-VPN start).
        proxy_http:
          type: boolean
          default: false
          description: |
            Whether to bind an HTTP CONNECT listener on
            127.0.0.1:{local_port_http}. HTTP CONNECT is TCP-only.
        local_port_http:
          type: integer
          format: uint16
          default: 4074
          description: |
            Port for the HTTP CONNECT listener. Must differ from
            local_port when both listeners are enabled.
        diagnostic_plugin_tap:
          type: boolean
          default: false
          description: |
            Wrap the plugin chain in a counting tap so per-TCP-connection
            byte flow + close-kind become visible in bridge.log. Off by
            default; the extra loopback hop is cheap on debug-mode
            reproduction but inappropriate at browser-traffic scale.
            Sourced from AppConfig.diagnostic_plugin_tap; the bridge can
            also be opted in via the HOLE_BRIDGE_PLUGIN_TAP=1 env var
            (dev-shell only — env vars don't survive into SCM/launchd
            contexts). Added in bindreams/hole#388 to give service-mode
            reproductions a knob the env var can't reach.

    TunnelMode:
      type: string
      description: |
        Tunnel installation mode. `full` installs the TUN adapter,
        binds the SOCKS5 listener, and adds split host routes — the
        production default and the only mode the GUI currently sends.
        `socks_only` binds only the SOCKS5 listener and performs no
        routing, wintun, DNS, or gateway work. It works without
        elevation and is intended for advanced SOCKS5-only users,
        containerized deployments, and tests.
      enum:
        - full
        - socks_only
      default: full

    ServerEntry:
      type: object
      description: "Hand-written in config.rs — included here for spec completeness."
      required:
        - id
        - name
        - server
        - server_port
        - method
        - password
      properties:
        id:
          type: string
        name:
          type: string
        server:
          type: string
        server_port:
          type: integer
          format: uint16
          minimum: 0
        method:
          type: string
        password:
          type: string
        plugin:
          type:
            - string
            - "null"
        plugin_opts:
          type:
            - string
            - "null"
        validation:
          description: |
            Hand-written in config.rs as ValidationState. Tagged enum with
            kind discriminator; see protocol.rs::ServerTestOutcome.
          type:
            - object
            - "null"

    TestServerRequest:
      type: object
      description: "Hand-written in protocol.rs; ServerTestOutcome is a tagged enum, not modeled here."
      required:
        - entry
      properties:
        entry:
          $ref: "#/components/schemas/ServerEntry"

    TestServerResponse:
      type: object
      description: "Hand-written in protocol.rs."
      required:
        - outcome
      properties:
        outcome:
          type: object
          description: |
            Tagged union with `kind` discriminator. Variants:
            reachable {kind, latency_ms}, dns_failed {kind}, tcp_refused {kind},
            tcp_timeout {kind}, plugin_start_failed {kind, detail},
            tunnel_handshake_failed {kind}, network_blocked {kind},
            server_cannot_reach_internet {kind},
            sentinel_mismatch {kind, detail}, internal_error {kind, detail}.
            See protocol.rs::ServerTestOutcome.

    LockdownRequest:
      type: object
      description: "Hand-written in protocol.rs."
      required:
        - enabled
      properties:
        enabled:
          type: boolean

    UpdateApplyRequest:
      type: object
      description: "Hand-written in protocol.rs."
      required:
        - payload_path
        - target_version
        - consent
        - sha256sums
        - sha256sums_minisig
        - asset_name
      properties:
        payload_path:
          type: string
          description: Path to the downloaded+verified MSI/DMG.
        target_version:
          type: string
        consent:
          type: boolean
          description: >-
            Informed consent that the tunnel may briefly leak during the
            restart. REQUIRED true for a lockdown-off update; ignored under
            lockdown-on (the standing cover holds the gap).
        sha256sums:
          type: string
          description: >-
            The release SHA256SUMS manifest text, so the privileged bridge can
            re-verify the payload offline before extracting (no network).
        sha256sums_minisig:
          type: string
          description: The minisign signature over sha256sums.
        asset_name:
          type: string
          description: The payload's filename, used to find its hash in sha256sums.
        app_dest:
          type: string
          nullable: true
          description: >-
            macOS only: the GUI's current_exe-derived .app swap target. A hint
            the bridge re-validates (CFBundleIdentifier == com.hole.app) before
            swapping; never a trust anchor. Null/absent on Windows.
