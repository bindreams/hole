openapi: "3.1.0"
info:
  title: Hole Bridge API
  description: REST API for controlling the Hole bridge over a local socket.
  version: "1.0.0"

paths:
  /v1/status:
    get:
      summary: Get proxy status
      operationId: getStatus
      responses:
        "200":
          description: Current proxy status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"

  /v1/start:
    post:
      summary: Start the proxy
      operationId: startProxy
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProxyConfig"
      responses:
        "200":
          description: Proxy started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmptyResponse"
        "500":
          description: Failed to start proxy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/stop:
    post:
      summary: Stop the proxy
      operationId: stopProxy
      responses:
        "200":
          description: Proxy stopped
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmptyResponse"
        "500":
          description: Failed to stop proxy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/reload:
    post:
      summary: Reload the proxy with new configuration
      operationId: reloadProxy
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProxyConfig"
      responses:
        "200":
          description: Proxy reloaded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmptyResponse"
        "500":
          description: Failed to reload proxy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/metrics:
    get:
      summary: Get connection metrics
      operationId: getMetrics
      responses:
        "200":
          description: Current traffic metrics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MetricsResponse"

  /v1/diagnostics:
    get:
      summary: Get diagnostic chain status
      operationId: getDiagnostics
      responses:
        "200":
          description: Health status of each component
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DiagnosticsResponse"

  /v1/public-ip:
    get:
      summary: Get public IP address
      operationId: getPublicIp
      responses:
        "200":
          description: Current public IP and country
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicIpResponse"

  /v1/test-server:
    post:
      summary: Run a one-shot shadowsocks client test against a server entry
      operationId: testServer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TestServerRequest"
      responses:
        "200":
          description: Test result (the test ran to completion; the outcome may itself be a failure variant)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TestServerResponse"
        "500":
          description: The test runner itself failed (not the test outcome)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    StatusResponse:
      type: object
      required:
        - running
        - uptime_secs
        - invalid_filters
        - udp_proxy_available
        - ipv6_bypass_available
      properties:
        running:
          type: boolean
        uptime_secs:
          type: integer
          format: uint64
          minimum: 0
        error:
          type:
            - string
            - "null"
        invalid_filters:
          description: |
            Filter rules that failed to compile when the current `ProxyConfig`
            was applied. Empty when the bridge is not running, or when all
            rules compiled successfully. Each entry references an index into
            the `ProxyConfig.filters` array sent in the most recent
            `start`/`reload` request.
          type: array
          items:
            $ref: "#/components/schemas/InvalidFilter"
        udp_proxy_available:
          description: |
            False when the currently-configured server uses a v2ray-plugin
            (plugins are TCP-only by protocol). When false, UDP rules with
            action=Proxy are silently downgraded to Bypass. When the bridge
            is not running, this field is `true` (no plugin in effect).
          type: boolean
        ipv6_bypass_available:
          description: |
            False when the upstream interface has no IPv6 connectivity
            (probed at proxy start). When false, IPv6 rules with action=Bypass
            are silently downgraded to Block. When the bridge is not running,
            this field is `true`.
          type: boolean

    ErrorResponse:
      type: object
      required:
        - message
      properties:
        message:
          type: string

    EmptyResponse:
      type: object
      additionalProperties: false

    MetricsResponse:
      type: object
      required:
        - bytes_in
        - bytes_out
        - speed_in_bps
        - speed_out_bps
        - uptime_secs
      properties:
        bytes_in:
          type: integer
          format: uint64
          minimum: 0
        bytes_out:
          type: integer
          format: uint64
          minimum: 0
        speed_in_bps:
          type: integer
          format: uint64
          minimum: 0
        speed_out_bps:
          type: integer
          format: uint64
          minimum: 0
        uptime_secs:
          type: integer
          format: uint64
          minimum: 0
        filter:
          description: |
            Filter engine metrics. `null` when the proxy is stopped (no
            dispatcher exists), `Some(...)` when running. Counters are
            cumulative for the lifetime of the current dispatcher instance —
            they reset on full proxy restart but persist across rule-only
            hot reloads.
          oneOf:
            - $ref: "#/components/schemas/FilterMetrics"
            - type: "null"

    InvalidFilter:
      type: object
      required:
        - index
        - error
      properties:
        index:
          description: |
            Position in the original `ProxyConfig.filters` array of the rule
            that failed to compile.
          type: integer
          format: uint32
          minimum: 0
        error:
          description: |
            Human-readable explanation of why the rule was rejected.
          type: string

    FilterMetrics:
      type: object
      required:
        - total_connections
        - proxied
        - bypassed
        - blocked
        - sniffer_hits
        - sniffer_misses
        - fake_dns_queries
        - fake_dns_reverse_hits
        - active_udp_flows
        - udp_drops_backpressure
      properties:
        total_connections:
          type: integer
          format: uint64
          minimum: 0
        proxied:
          type: integer
          format: uint64
          minimum: 0
        bypassed:
          type: integer
          format: uint64
          minimum: 0
        blocked:
          type: integer
          format: uint64
          minimum: 0
        sniffer_hits:
          type: integer
          format: uint64
          minimum: 0
        sniffer_misses:
          type: integer
          format: uint64
          minimum: 0
        fake_dns_queries:
          type: integer
          format: uint64
          minimum: 0
        fake_dns_reverse_hits:
          type: integer
          format: uint64
          minimum: 0
        active_udp_flows:
          type: integer
          format: uint32
          minimum: 0
        udp_drops_backpressure:
          type: integer
          format: uint64
          minimum: 0

    DiagnosticsResponse:
      type: object
      required:
        - app
        - bridge
        - network
        - vpn_server
        - internet
      properties:
        app:
          type: string
          description: |
            Always "ok" inside this handler — being able to respond proves the
            GUI process is alive. The GUI overrides to "unknown" only when the
            IPC call to the bridge fails entirely.
        bridge:
          type: string
          description: |
            Always "ok" inside this handler — being able to respond proves the
            bridge IPC server is alive. Set to "unknown" by the GUI fallback
            path when the bridge is unreachable.
        network:
          type: string
          description: |
            "ok" if the host has a default gateway configured (a weak proxy
            for local network availability). "error" if no default gateway
            can be detected. Best-effort local check; does not actually
            probe the gateway.
        vpn_server:
          type: string
          description: |
            Bridge always returns "unknown". The GUI computes this dot from
            the selected ServerEntry's persisted validation state and
            ignores this field. Kept on the wire for backward compatibility.
        internet:
          type: string
          description: |
            Bridge always returns "unknown". The GUI computes this dot from
            the selected ServerEntry's persisted validation state and
            ignores this field.

    PublicIpResponse:
      type: object
      required:
        - ip
        - country_code
      properties:
        ip:
          type: string
        country_code:
          type: string

    # Documentation-only schemas (not code-generated; hand-written in Rust)
    ProxyConfig:
      type: object
      description: "Hand-written in protocol.rs — included here for spec completeness."
      required:
        - server
        - local_port
      properties:
        server:
          $ref: "#/components/schemas/ServerEntry"
        local_port:
          type: integer
          format: uint16
          minimum: 0
        filters:
          description: |
            Optional list of filter rules applied by the bridge dispatcher.
            Defaults to empty (no filtering — all captured traffic proxied).
            Rules are evaluated in reverse order: the last matching rule
            wins (gitignore semantics). The full filter engine is documented
            in the design spec.
          type: array
          default: []
          items:
            $ref: "#/components/schemas/FilterRule"

    FilterRule:
      type: object
      description: "Hand-written in config.rs — included here for spec completeness."
      required:
        - address
        - matching
        - action
      properties:
        address:
          description: |
            Domain name (`example.com`), wildcard glob (`*.example.com`),
            IP literal (`192.168.1.1`, `::1`), or CIDR (`10.0.0.0/8`,
            `2001:db8::/32`). Interpretation depends on `matching`.
          type: string
        matching:
          $ref: "#/components/schemas/MatchType"
        action:
          $ref: "#/components/schemas/FilterAction"

    MatchType:
      type: string
      description: "Hand-written in config.rs."
      enum:
        - exactly
        - with_subdomains
        - wildcard
        - subnet

    FilterAction:
      type: string
      description: "Hand-written in config.rs."
      enum:
        - proxy
        - bypass
        - block

    ServerEntry:
      type: object
      description: "Hand-written in config.rs — included here for spec completeness."
      required:
        - id
        - name
        - server
        - server_port
        - method
        - password
      properties:
        id:
          type: string
        name:
          type: string
        server:
          type: string
        server_port:
          type: integer
          format: uint16
          minimum: 0
        method:
          type: string
        password:
          type: string
        plugin:
          type:
            - string
            - "null"
        plugin_opts:
          type:
            - string
            - "null"
        validation:
          description: |
            Hand-written in config.rs as ValidationState. Tagged enum with
            kind discriminator; see protocol.rs::ServerTestOutcome.
          type:
            - object
            - "null"

    TestServerRequest:
      type: object
      description: "Hand-written in protocol.rs; ServerTestOutcome is a tagged enum, not modeled here."
      required:
        - entry
      properties:
        entry:
          $ref: "#/components/schemas/ServerEntry"

    TestServerResponse:
      type: object
      description: "Hand-written in protocol.rs."
      required:
        - outcome
      properties:
        outcome:
          type: object
          description: |
            Tagged union with `kind` discriminator. Variants:
            reachable {kind, latency_ms}, dns_failed {kind}, tcp_refused {kind},
            tcp_timeout {kind}, plugin_start_failed {kind, detail},
            tunnel_handshake_failed {kind}, server_cannot_reach_internet {kind},
            sentinel_mismatch {kind, detail}, internal_error {kind, detail}.
            See protocol.rs::ServerTestOutcome.
