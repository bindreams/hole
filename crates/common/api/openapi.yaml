openapi: "3.1.0"
info:
  title: Hole Bridge API
  description: REST API for controlling the Hole bridge over a local socket.
  version: "1.0.0"

paths:
  /v1/status:
    get:
      summary: Get proxy status
      operationId: getStatus
      responses:
        "200":
          description: Current proxy status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"

  /v1/start:
    post:
      summary: Start the proxy
      operationId: startProxy
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProxyConfig"
      responses:
        "200":
          description: Proxy started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmptyResponse"
        "500":
          description: Failed to start proxy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/stop:
    post:
      summary: Stop the proxy
      operationId: stopProxy
      responses:
        "200":
          description: Proxy stopped
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmptyResponse"
        "500":
          description: Failed to stop proxy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/cancel:
    post:
      summary: Cancel an in-flight proxy start
      description: |
        Idempotent signal that interrupts an in-flight `POST /v1/start`. If no
        start is currently in flight, the cancel is "pre-armed" and consumed by
        the very next start. Always returns 200 — the bridge records the intent
        regardless of whether there is anything to cancel right now. The
        cancelled start itself returns 500 with `ErrorResponse { message: "cancelled" }`.
      operationId: cancelProxy
      responses:
        "200":
          description: Cancel recorded (idempotent)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmptyResponse"

  /v1/reload:
    post:
      summary: Reload the proxy with new configuration
      operationId: reloadProxy
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProxyConfig"
      responses:
        "200":
          description: Proxy reloaded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmptyResponse"
        "500":
          description: Failed to reload proxy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/metrics:
    get:
      summary: Get connection metrics
      operationId: getMetrics
      responses:
        "200":
          description: Current traffic metrics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MetricsResponse"

  /v1/diagnostics:
    get:
      summary: Get diagnostic chain status
      operationId: getDiagnostics
      responses:
        "200":
          description: Health status of each component
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DiagnosticsResponse"

  /v1/public-ip:
    get:
      summary: Get public IP address
      operationId: getPublicIp
      responses:
        "200":
          description: Current public IP and country
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicIpResponse"

  /v1/test-server:
    post:
      summary: Run a one-shot shadowsocks client test against a server entry
      operationId: testServer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TestServerRequest"
      responses:
        "200":
          description: Test result (the test ran to completion; the outcome may itself be a failure variant)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TestServerResponse"
        "500":
          description: The test runner itself failed (not the test outcome)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    StatusResponse:
      type: object
      required:
        - running
        - uptime_secs
      properties:
        running:
          type: boolean
        uptime_secs:
          type: integer
          format: uint64
          minimum: 0
        error:
          type:
            - string
            - "null"

    ErrorResponse:
      type: object
      required:
        - message
      properties:
        message:
          type: string

    EmptyResponse:
      type: object
      additionalProperties: false

    MetricsResponse:
      type: object
      required:
        - bytes_in
        - bytes_out
        - speed_in_bps
        - speed_out_bps
        - uptime_secs
      properties:
        bytes_in:
          type: integer
          format: uint64
          minimum: 0
        bytes_out:
          type: integer
          format: uint64
          minimum: 0
        speed_in_bps:
          type: integer
          format: uint64
          minimum: 0
        speed_out_bps:
          type: integer
          format: uint64
          minimum: 0
        uptime_secs:
          type: integer
          format: uint64
          minimum: 0

    DiagnosticsResponse:
      type: object
      required:
        - app
        - bridge
        - network
        - vpn_server
        - internet
      properties:
        app:
          type: string
          description: |
            Always "ok" inside this handler — being able to respond proves the
            GUI process is alive. The GUI overrides to "unknown" only when the
            IPC call to the bridge fails entirely.
        bridge:
          type: string
          description: |
            Always "ok" inside this handler — being able to respond proves the
            bridge IPC server is alive. Set to "unknown" by the GUI fallback
            path when the bridge is unreachable.
        network:
          type: string
          description: |
            "ok" if the host has a default gateway configured (a weak proxy
            for local network availability). "error" if no default gateway
            can be detected. Best-effort local check; does not actually
            probe the gateway.
        vpn_server:
          type: string
          description: |
            Bridge always returns "unknown". The GUI computes this dot from
            the selected ServerEntry's persisted validation state and
            ignores this field. Kept on the wire for backward compatibility.
        internet:
          type: string
          description: |
            Bridge always returns "unknown". The GUI computes this dot from
            the selected ServerEntry's persisted validation state and
            ignores this field.

    PublicIpResponse:
      type: object
      required:
        - ip
        - country_code
      properties:
        ip:
          type: string
        country_code:
          type: string

    # Documentation-only schemas (not code-generated; hand-written in Rust)
    ProxyConfig:
      type: object
      description: "Hand-written in protocol.rs — included here for spec completeness."
      required:
        - server
        - local_port
      properties:
        server:
          $ref: "#/components/schemas/ServerEntry"
        local_port:
          type: integer
          format: uint16
          minimum: 0

    ServerEntry:
      type: object
      description: "Hand-written in config.rs — included here for spec completeness."
      required:
        - id
        - name
        - server
        - server_port
        - method
        - password
      properties:
        id:
          type: string
        name:
          type: string
        server:
          type: string
        server_port:
          type: integer
          format: uint16
          minimum: 0
        method:
          type: string
        password:
          type: string
        plugin:
          type:
            - string
            - "null"
        plugin_opts:
          type:
            - string
            - "null"
        validation:
          description: |
            Hand-written in config.rs as ValidationState. Tagged enum with
            kind discriminator; see protocol.rs::ServerTestOutcome.
          type:
            - object
            - "null"

    TestServerRequest:
      type: object
      description: "Hand-written in protocol.rs; ServerTestOutcome is a tagged enum, not modeled here."
      required:
        - entry
      properties:
        entry:
          $ref: "#/components/schemas/ServerEntry"

    TestServerResponse:
      type: object
      description: "Hand-written in protocol.rs."
      required:
        - outcome
      properties:
        outcome:
          type: object
          description: |
            Tagged union with `kind` discriminator. Variants:
            reachable {kind, latency_ms}, dns_failed {kind}, tcp_refused {kind},
            tcp_timeout {kind}, plugin_start_failed {kind, detail},
            tunnel_handshake_failed {kind}, server_cannot_reach_internet {kind},
            sentinel_mismatch {kind, detail}, internal_error {kind, detail}.
            See protocol.rs::ServerTestOutcome.
