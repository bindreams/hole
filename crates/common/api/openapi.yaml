openapi: "3.1.0"
info:
  title: Hole Bridge API
  description: REST API for controlling the Hole bridge over a local socket.
  version: "1.0.0"

paths:
  /v1/status:
    get:
      summary: Get proxy status
      operationId: getStatus
      responses:
        "200":
          description: Current proxy status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"

  /v1/start:
    post:
      summary: Start the proxy
      operationId: startProxy
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProxyConfig"
      responses:
        "200":
          description: Proxy started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmptyResponse"
        "500":
          description: Failed to start proxy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/stop:
    post:
      summary: Stop the proxy
      operationId: stopProxy
      responses:
        "200":
          description: Proxy stopped
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmptyResponse"
        "500":
          description: Failed to stop proxy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/reload:
    post:
      summary: Reload the proxy with new configuration
      operationId: reloadProxy
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProxyConfig"
      responses:
        "200":
          description: Proxy reloaded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmptyResponse"
        "500":
          description: Failed to reload proxy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/metrics:
    get:
      summary: Get connection metrics
      operationId: getMetrics
      responses:
        "200":
          description: Current traffic metrics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MetricsResponse"

  /v1/diagnostics:
    get:
      summary: Get diagnostic chain status
      operationId: getDiagnostics
      responses:
        "200":
          description: Health status of each component
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DiagnosticsResponse"

  /v1/public-ip:
    get:
      summary: Get public IP address
      operationId: getPublicIp
      responses:
        "200":
          description: Current public IP and country
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicIpResponse"

components:
  schemas:
    StatusResponse:
      type: object
      required:
        - running
        - uptime_secs
      properties:
        running:
          type: boolean
        uptime_secs:
          type: integer
          format: uint64
          minimum: 0
        error:
          type:
            - string
            - "null"

    ErrorResponse:
      type: object
      required:
        - message
      properties:
        message:
          type: string

    EmptyResponse:
      type: object
      additionalProperties: false

    MetricsResponse:
      type: object
      required:
        - bytes_in
        - bytes_out
        - speed_in_bps
        - speed_out_bps
        - uptime_secs
      properties:
        bytes_in:
          type: integer
          format: uint64
          minimum: 0
        bytes_out:
          type: integer
          format: uint64
          minimum: 0
        speed_in_bps:
          type: integer
          format: uint64
          minimum: 0
        speed_out_bps:
          type: integer
          format: uint64
          minimum: 0
        uptime_secs:
          type: integer
          format: uint64
          minimum: 0

    DiagnosticsResponse:
      type: object
      required:
        - app
        - bridge
        - network
        - vpn_server
        - internet
      properties:
        app:
          type: string
          description: |
            Always "ok" inside this handler — being able to respond proves the
            GUI process is alive. The GUI overrides to "unknown" only when the
            IPC call to the bridge fails entirely.
        bridge:
          type: string
          description: |
            Always "ok" inside this handler — being able to respond proves the
            bridge IPC server is alive. Set to "unknown" by the GUI fallback
            path when the bridge is unreachable.
        network:
          type: string
          description: |
            "ok" if the host has a default gateway configured (a weak proxy
            for local network availability). "error" if no default gateway
            can be detected. Best-effort local check; does not actually
            probe the gateway.
        vpn_server:
          type: string
          description: |
            From the bridge: "ok" when the proxy tunnel is Running
            (reachability is implied), or "unknown" when the proxy is
            Stopped (the bridge has no server config to probe). The GUI
            overrides any "unknown" value (whether from this handler or
            from the bridge-unreachable fallback path) with the result of
            a TCP connect probe against the user's currently selected
            server: "ok" if a TCP connection to host:port can be
            established (implies network reachability and an open
            listener; does not validate the shadowsocks handshake or that
            a working server is actually behind the port), "error" if
            unreachable.
        internet:
          type: string
          description: |
            Always "unknown" today. A real connectivity check (HTTPS probe
            through the tunnel) is a follow-up.

    PublicIpResponse:
      type: object
      required:
        - ip
        - country_code
      properties:
        ip:
          type: string
        country_code:
          type: string

    # Documentation-only schemas (not code-generated; hand-written in Rust)
    ProxyConfig:
      type: object
      description: "Hand-written in protocol.rs — included here for spec completeness."
      required:
        - server
        - local_port
      properties:
        server:
          $ref: "#/components/schemas/ServerEntry"
        local_port:
          type: integer
          format: uint16
          minimum: 0

    ServerEntry:
      type: object
      description: "Hand-written in config.rs — included here for spec completeness."
      required:
        - id
        - name
        - server
        - server_port
        - method
        - password
      properties:
        id:
          type: string
        name:
          type: string
        server:
          type: string
        server_port:
          type: integer
          format: uint16
          minimum: 0
        method:
          type: string
        password:
          type: string
        plugin:
          type:
            - string
            - "null"
        plugin_opts:
          type:
            - string
            - "null"
