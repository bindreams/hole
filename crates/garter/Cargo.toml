[package]
name = "garter"
version = "0.1.0"
edition.workspace = true
license = "Apache-2.0"
description = "Plugin-chain runner for SIP003u shadowsocks plugins."
repository = "https://github.com/bindreams/hole"
homepage = "https://github.com/bindreams/hole"
readme = "README.md"
keywords = ["shadowsocks", "sip003", "plugin", "proxy"]
categories = ["network-programming"]

[package.metadata.hole-release]
group = "garter"

[lints]
workspace = true

[dependencies]
tokio = { version = "1", features = ["full"] }
tokio-util = { version = "0.7", features = ["compat"] }
tracing = "0.1"
thiserror = "2"
contracts = { workspace = true }
async-trait = { workspace = true }

[lib]
harness = false

[dev-dependencies]
skuld = { workspace = true }
socket2 = "0.6"
tracing-subscriber = { version = "0.3", features = ["env-filter", "fmt"] }

[[test]]
name = "chain_integration"
path = "tests/chain_integration.rs"
harness = false

[[test]]
name = "tap_integration"
path = "tests/tap_integration.rs"
harness = false

[target.'cfg(unix)'.dependencies]
libc = "0.2"

[target.'cfg(windows)'.dependencies]
windows = { version = "0.61", features = [
    "Win32_Foundation",
    "Win32_System_Console",
    "Win32_System_JobObjects",
    "Win32_System_Threading",
] }

[target.'cfg(windows)'.dev-dependencies]
windows = { version = "0.61", features = ["Win32_Networking_WinSock"] }
