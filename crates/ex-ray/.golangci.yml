version: "2"

linters:
  # `standard` = errcheck, govet, ineffassign, staticcheck, unused.
  # govet subsumes the old `go vet` hook; ineffassign is already in the set
  # (do NOT also list it under `enable`).
  default: standard
  enable:
    - revive
    - misspell
    - unconvert
    - gosec

formatters:
  # gofumpt is a strict superset of gofmt. `golangci-lint fmt` formats; the
  # `go-fmt` prek hook runs `fmt --diff` (check-only). Authoritative for Go
  # formatting (so `.editorconfig`/editorconfig-checker excludes Go).
  enable:
    - gofumpt
