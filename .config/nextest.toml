[profile.default]
# Warn after 10s of runtime, hard-kill after 30s (10s × 3).
# E2E tests with real ss-server + SOCKS5 round-trips typically finish under 5s.
slow-timeout = { period = "10s", terminate-after = 3 }

# E2E tests marked `serial` in skuld must not overlap: they share process-global
# resources (TUN device, system routes, ephemeral ports, galoshes extraction dir).
# Skuld's in-process Mutex doesn't cross process boundaries under nextest, so we
# enforce serialization here at the nextest scheduler level.
[test-groups.e2e-serial]
max-threads = 1

[[profile.default.overrides]]
filter = 'package(hole-bridge) & (test(/_roundtrip$/) | test(/^lifecycle_/))'
test-group = 'e2e-serial'
